# Project-wide Gradle settings
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.daemon=true
org.gradle.configureondemand=true
org.gradle.workers.max=4

# Android specific
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=true
android.nonFinalResIds=false
android.experimental.enableNewResourceShrinker=true

# Kotlin
kotlin.code.style=official
kotlin.incremental=true
kotlin.incremental.js=true
kotlin.incremental.multiplatform=true
kotlin.parallel.tasks.in.project=true
kotlin.allWarningsAsErrors=false

# Build cache
android.buildCache.enabled=true
android.enableBuildCache=true
android.buildCacheDir=build-cache/

# Compile options
android.jetifier.ignoreList=core
android.experimental.lint.correctness.obsoleteSdkInt=true

# Version info
VERSION_NAME=1.0.0
VERSION_CODE=1
VERSION_SUFFIX=

# Module versions
CORE_VERSION=1.0.0
GUI_VERSION=1.0.0
SHARED_VERSION=1.0.0
