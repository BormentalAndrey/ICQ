name: Mirror Repository

on:
  schedule:
    # Запускать каждый день в 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Возможность ручного запуска

jobs:
  mirror:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Получаем всю историю
          path: target-repo
          
      - name: Clone source repository
        run: |
          git clone --mirror https://github.com/mail-ru-im/im-desktop.git source-repo
          
      - name: Configure git
        run: |
          cd source-repo
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
      - name: Push to target repository
        env:
          TARGET_URL: "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        run: |
          cd source-repo
          git push --mirror "$TARGET_URL"
