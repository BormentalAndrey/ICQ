# .github/workflows/build.yml
name: Build ICQ Mobile

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev cmake ninja-build
      
      - name: Download and setup Boost for Android
        run: |
          # Скачиваем Boost
          wget -q https://archives.boost.io/release/1.85.0/source/boost_1_85_0.tar.bz2
          tar -xjf boost_1_85_0.tar.bz2
          export BOOST_ROOT=$(pwd)/boost_1_85_0
          echo "BOOST_ROOT=$BOOST_ROOT" >> $GITHUB_ENV
          
          # Создаем симлинк для stacktrace.hpp если нужно
          echo "✅ Boost downloaded to $BOOST_ROOT"
      
      - name: Fix C++ headers (add im_assert if missing)
        run: |
          # Добавляем im_assert в core/tools/scope.h если его там нет
          SCOPE_FILE="core/tools/scope.h"
          if [ -f "$SCOPE_FILE" ]; then
            if ! grep -q "#define im_assert" "$SCOPE_FILE"; then
              cat >> "$SCOPE_FILE" << 'EOF'

// Added for Android build
#ifndef im_assert
#include <android/log.h>
#include <cstdlib>
#define im_assert(condition) do { \
    if (!(condition)) { \
        __android_log_print(ANDROID_LOG_ERROR, "ICQCore", \
            "Assertion failed: %s:%d: %s", __FILE__, __LINE__, #condition); \
        abort(); \
    } \
} while(0)
#endif
EOF
              echo "✅ Added im_assert to $SCOPE_FILE"
            else
              echo "✅ im_assert already defined in $SCOPE_FILE"
            fi
          else
            echo "⚠️ scope.h not found at $SCOPE_FILE"
          fi
      
      - name: Create required Android resource files
        run: |
          # Создаем папки для ресурсов
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          
          # Создаем data_extraction_rules.xml
          cat > app/src/main/res/xml/data_extraction_rules.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup>
                  <include domain="file" path=".*\.db"/>
                  <exclude domain="file" path="cache/"/>
              </cloud-backup>
          </data-extraction-rules>
          EOF
          
          # Создаем backup_rules.xml
          cat > app/src/main/res/xml/backup_rules.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content>
              <include domain="file" path="."/>
              <exclude domain="file" path="cache/"/>
          </full-backup-content>
          EOF
          
          # Создаем bools.xml
          cat > app/src/main/res/values/bools.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <bool name="use_light_status_bar">false</bool>
              <bool name="use_light_navigation_bar">false</bool>
          </resources>
          EOF
          
          # Создаем круглые иконки из обычных (если есть)
          for dir in app/src/main/res/mipmap-*; do
            if [ -f "$dir/ic_launcher.png" ] && [ ! -f "$dir/ic_launcher_round.png" ]; then
              cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
              echo "✅ Created round icon in $dir"
            fi
          done
          
          # Переименовываем иконки если они названы неправильно
          find app/src/main/res -name "ic_launcher1" -exec sh -c 'mv "$0" "$(dirname "$0")/ic_launcher.png"' {} \;
      
      - name: Fix AndroidManifest.xml
        run: |
          # Удаляем package атрибут из манифеста если есть
          sed -i 's/package="com.icq.mobile"//g' app/src/main/AndroidManifest.xml
          
          # Убеждаемся что нет ссылок на отсутствующие ресурсы
          echo "✅ AndroidManifest.xml checked"
      
      - name: Setup Gradle with Boost paths
        run: |
          # Создаем local.properties с путями
          cat >> local.properties << EOF
          ndk.dir=/usr/local/lib/android/sdk/ndk/25.2.9519653
          sdk.dir=/usr/local/lib/android/sdk
          boost.root=$BOOST_ROOT
          EOF
          
          chmod +x gradlew
          ./gradlew --version
      
      - name: Build debug APK with CMake debugging
        run: |
          ./gradlew :app:assembleDebug --stacktrace
        env:
          ORG_GRADLE_PROJECT_boostRoot: ${{ env.BOOST_ROOT }}
          CMAKE_CXX_FLAGS: -I${{ env.BOOST_ROOT }}
      
      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk
      
      - name: Upload build logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/reports/
            app/.cxx/**/*.log
            .gradle/daemon/**/daemon-*.log
      
      - name: Run tests
        if: success()
        run: |
          ./gradlew testDebugUnitTest
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/
