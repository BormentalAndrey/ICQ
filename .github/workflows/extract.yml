name: Android Production Build

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java & Python
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install aqtinstall
        run: pip3 install aqtinstall==3.1.* # Используем стабильную версию для Qt5

      - name: Restore Missing Qt5 Files
        run: |
          # Создаем временную папку для загрузки
          mkdir -p ./temp_qt
          
          # 1. Загружаем официальный SDK (только необходимые архивы для экономии времени)
          # Для Android (архитектура arm64-v8a)
          python3 -m aqt install-qt linux android 5.15.2 android_arm64_v8a -O ./temp_qt --archives qtbase qtdeclarative
          
          # Для инструментов Хоста (MOC, RCC, UIC - они нужны в формате linux_x64)
          python3 -m aqt install-qt linux desktop 5.15.2 gcc_64 -O ./temp_qt --archives qtbase
          
          # 2. Интеграция в ваш qt5-bundle
          echo "Интеграция CMake конфигураций..."
          # Копируем содержимое lib/cmake в ваш бандл
          cp -r ./temp_qt/5.15.2/android_arm64_v8a/lib/cmake/* ./qt5-bundle/cmake/
          
          # 3. Копируем инструменты сборки (MOC, RCC)
          # Без них Clang не сможет обработать файлы с Q_OBJECT
          mkdir -p ./qt5-bundle/bin
          cp ./temp_qt/5.15.2/gcc_64/bin/moc ./qt5-bundle/bin/
          cp ./temp_qt/5.15.2/gcc_64/bin/rcc ./qt5-bundle/bin/
          cp ./temp_qt/5.15.2/gcc_64/bin/uic ./qt5-bundle/bin/
          chmod +x ./qt5-bundle/bin/*
          
          # 4. Удаляем временные файлы
          rm -rf ./temp_qt
          echo "✅ Докачка недостающих компонентов Qt5 завершена успешно"

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          # NDK 25/26 стабильны для этой конфигурации
          packages: 'ndk;26.1.10909125'

      - name: Run Windows-to-Android Refactor
        run: |
          # Автоматическое исправление WinAPI на Qt аналоги
          if [ -f "auto_refactor.py" ]; then
            python3 auto_refactor.py --apply
          fi
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Build APK with Gradle
        run: |
          chmod +x gradlew
          
          # Добавляем инструменты Qt в PATH для Gradle/CMake
          export PATH=${{ github.workspace }}/qt5-bundle/bin:$PATH
          
          # Запуск сборки
          ./gradlew :app:assembleDebug \
            -Pqt.android.path=${{ github.workspace }}/qt5-bundle \
            -Pandroid.ndkpath=$ANDROID_HOME/ndk/26.1.10909125 \
            --stacktrace
        env:
          # Пути для CMake внутри Gradle
          CMAKE_PREFIX_PATH: ${{ github.workspace }}/qt5-bundle/cmake/Qt5
          Qt5_DIR: ${{ github.workspace }}/qt5-bundle/cmake/Qt5

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-production
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
