name: Debug OpenSSL Extraction

on: workflow_dispatch

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: List files BEFORE extraction
        run: |
          echo "=== FILES BEFORE EXTRACTION ==="
          ls -la
          echo ""
          echo "=== CHECK ARCHIVE SIZE ==="
          ls -lh openssl-android-arm64-only.tar.gz
          
      - name: Extract archive
        run: |
          echo "=== EXTRACTING ==="
          tar -xzvf openssl-android-arm64-only.tar.gz 2>&1
          echo "Exit code: $?"
          
      - name: List files AFTER extraction
        run: |
          echo "=== FILES AFTER EXTRACTION ==="
          ls -la
          echo ""
          echo "=== NEW DIRECTORIES ==="
          find . -maxdepth 2 -type d | sort
          echo ""
          echo "=== SEARCH FOR .a FILES ==="
          find . -name "*.a"
          echo ""
          echo "=== SEARCH FOR .h FILES ==="
          find . -name "*.h" | head -20
          echo ""
          echo "=== SEARCH FOR openssl ANYTHING ==="
          find . \( -name "*openssl*" -o -name "*ssl*" \) | head -20
          
      - name: Show archive contents
        run: |
          echo "=== WHAT'S INSIDE THE ARCHIVE? ==="
          tar -tzf openssl-android-arm64-only.tar.gz | head -30

      - name: Commit and push extracted OpenSSL folder
        run: |
          echo "=== COMMITTING EXTRACTED FOLDER TO REPOSITORY ==="
          
          # Настраиваем git для коммита от имени GitHub Actions
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Добавляем все новые файлы и папки, которые появились после распаковки
          git add .
          
          # Проверяем, есть ли изменения
          if git diff --cached --quiet; then
            echo "Нет новых изменений для коммита (папка уже была распакована ранее)"
          else
            git commit -m "Extract and commit OpenSSL Android arm64-only prebuilt libraries"
            git push
            echo "✅ Папка успешно распакована и сохранена в репозитории!"
          fi
