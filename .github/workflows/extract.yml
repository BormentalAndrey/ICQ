# .github/workflows/debug-build.yml
name: Debug Build ICQ Mobile

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  debug-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"
      
      - name: Full diagnostics - find all gradle files
        run: |
          echo "========================================="
          echo "STEP 1: Finding all .gradle files"
          echo "========================================="
          find . -name "*.gradle*" -type f | sort -f
          
          echo "\n========================================="
          echo "STEP 2: Finding repositories in all files"
          echo "========================================="
          find . -name "*.gradle*" -type f -exec grep -l "repositories" {} \;
          
          echo "\n========================================="
          echo "STEP 3: Finding google() in all files"
          echo "========================================="
          find . -name "*.gradle*" -type f -exec grep -l "google()" {} \;
          
          echo "\n========================================="
          echo "STEP 4: Finding mavenCentral() in all files"
          echo "========================================="
          find . -name "*.gradle*" -type f -exec grep -l "mavenCentral()" {} \;
      
      - name: Show content of all gradle files
        run: |
          echo "========================================="
          echo "Content of settings.gradle.kts:"
          echo "========================================="
          cat -A settings.gradle.kts
          
          echo "\n========================================="
          echo "Content of build.gradle.kts:"
          echo "========================================="
          cat -A build.gradle.kts
          
          echo "\n========================================="
          echo "Content of gradle.properties:"
          echo "========================================="
          cat -A gradle.properties
          
          echo "\n========================================="
          echo "Content of gradle-wrapper.properties:"
          echo "========================================="
          cat -A gradle/wrapper/gradle-wrapper.properties
      
      - name: Check for hidden BOM characters
        run: |
          echo "========================================="
          echo "Checking for UTF-8 BOM in files:"
          echo "========================================="
          find . -name "*.gradle.kts" -exec file {} \; | grep "UTF-8 Unicode (with BOM)" || echo "No BOM found"
      
      - name: Kill any existing gradle daemons
        run: |
          ./gradlew --stop
          pkill -f gradle || true
      
      - name: Clear Gradle cache
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf .gradle
          rm -rf */build
      
      - name: Create fresh gradle wrapper with Gradle 8.6
        run: |
          rm -rf gradle/wrapper
          mkdir -p gradle/wrapper
          
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          
          chmod +x gradlew
          ./gradlew --version
      
      - name: Test with FAIL_ON_PROJECT_REPOS to identify problematic module
        run: |
          echo "========================================="
          echo "Testing with FAIL_ON_PROJECT_REPOS mode"
          echo "========================================="
          
          # Backup original settings
          cp settings.gradle.kts settings.gradle.kts.backup
          
          # Modify to FAIL_ON_PROJECT_REPOS
          sed -i 's/PREFER_SETTINGS/FAIL_ON_PROJECT_REPOS/' settings.gradle.kts
          
          echo "Modified settings.gradle.kts:"
          grep -A 2 "repositoriesMode" settings.gradle.kts
          
          # Try to build - this will fail and show which module adds repositories
          ./gradlew :app:assembleDebug --stacktrace || true
          
          # Restore original
          mv settings.gradle.kts.backup settings.gradle.kts
      
      - name: Try minimal configuration with only app module
        run: |
          echo "========================================="
          echo "Testing with minimal configuration"
          echo "========================================="
          
          # Create minimal settings.gradle.kts
          cat > settings.gradle.kts.min << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.name = "ICQ"
          include(":app")
          EOF
          
          mv settings.gradle.kts settings.gradle.kts.full
          mv settings.gradle.kts.min settings.gradle.kts
          
          # Create minimal build.gradle.kts
          cat > build.gradle.kts.min << 'EOF'
          plugins {
              id("com.android.application") version "8.6.0" apply false
          }
          EOF
          
          mv build.gradle.kts build.gradle.kts.full
          mv build.gradle.kts.min build.gradle.kts
          
          # Try to build only app
          ./gradlew :app:assembleDebug --stacktrace || true
          
          # Restore original files
          mv settings.gradle.kts.full settings.gradle.kts
          mv build.gradle.kts.full build.gradle.kts
      
      - name: Try with Gradle 8.4
        run: |
          echo "========================================="
          echo "Testing with Gradle 8.4"
          echo "========================================="
          
          sed -i 's/gradle-8.6-bin.zip/gradle-8.4-bin.zip/' gradle/wrapper/gradle-wrapper.properties
          ./gradlew --version
          
          ./gradlew :app:assembleDebug --stacktrace || true
      
      - name: Try with all repositories in settings.gradle.kts only
        run: |
          echo "========================================="
          echo "Testing with clean settings.gradle.kts"
          echo "========================================="
          
          # Create absolutely minimal settings.gradle.kts
          cat > settings.gradle.kts.clean << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.name = "ICQ"
          include(":app")
          include(":core")
          include(":corelib")
          include(":gui")
          include(":gui.shared")
          include(":common.shared")
          include(":libomicron")
          include(":unittests")
          EOF
          
          mv settings.gradle.kts settings.gradle.kts.backup2
          mv settings.gradle.kts.clean settings.gradle.kts
          
          # Try build
          ./gradlew :app:assembleDebug --stacktrace || true
          
          # Restore
          mv settings.gradle.kts.backup2 settings.gradle.kts
      
      - name: Final attempt with clean environment
        run: |
          echo "========================================="
          echo "Final attempt with clean environment"
          echo "========================================="
          
          # Full cleanup
          rm -rf ~/.gradle/caches/
          rm -rf .gradle
          rm -rf */build
          ./gradlew --stop
          
          # Fresh wrapper
          ./gradlew --version
          
          # Try build with original files
          ./gradlew :app:assembleDebug --stacktrace
      
      - name: Upload logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: |
            **/build/reports/
            .gradle/daemon/**/daemon-*.log
          retention-days: 7
