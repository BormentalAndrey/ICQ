# .github/workflows/extract-qt-bundle.yml
name: Extract Qt5 Bundle

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'qt5-bundle.tar.gz'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Qt5 bundle
        run: |
          echo "Распаковка Qt5 бандла..."
          
          # Создаем директорию для Qt5
          mkdir -p qt5-bundle
          
          # Распаковываем архив
          tar -xzf qt5-bundle.tar.gz -C qt5-bundle/
          
          echo "✅ Распаковано:"
          ls -la qt5-bundle/

      - name: Remove archive
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Удаляем архив
          git rm qt5-bundle.tar.gz
          
          # Добавляем распакованную папку
          git add qt5-bundle/
          
          # Коммитим
          git commit -m "Extract Qt5 bundle and remove archive" || echo "Нет изменений"
          
          # Пушим
          git push
