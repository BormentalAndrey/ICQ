name: Debug OpenSSL Extraction

on: workflow_dispatch

jobs:
  debug:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: List files BEFORE extraction
        run: |
          echo "=== FILES BEFORE EXTRACTION ==="
          ls -la
          echo ""
          echo "=== CHECK ARCHIVE SIZE ==="
          ls -lh openssl-android-arm64-only.tar.gz
          
      - name: Extract archive
        run: |
          echo "=== EXTRACTING ==="
          tar -xzvf openssl-android-arm64-only.tar.gz 2>&1
          echo "Exit code: $?"
          
      - name: List files AFTER extraction
        run: |
          echo "=== FILES AFTER EXTRACTION ==="
          ls -la
          echo ""
          echo "=== NEW DIRECTORIES ==="
          find . -maxdepth 2 -type d | sort
          echo ""
          echo "=== SEARCH FOR .a FILES ==="
          find . -name "*.a"
          echo ""
          echo "=== SEARCH FOR .h FILES ==="
          find . -name "*.h" | head -20
          echo ""
          echo "=== SEARCH FOR openssl ANYTHING ==="
          find . -name "*openssl*" -o -name "*ssl*" | head -20
          
      - name: Show archive contents
        run: |
          echo "=== WHAT'S INSIDE THE ARCHIVE? ==="
          tar -tzf openssl-android-arm64-only.tar.gz | head -30
