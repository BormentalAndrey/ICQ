# .github/workflows/build.yml
name: Build ICQ Mobile

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"
      
      - name: Install Boost and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libboost-all-dev \
            cmake \
            ninja-build \
            build-essential
      
      - name: Download Boost source (for Android)
        run: |
          wget -q https://archives.boost.io/release/1.85.0/source/boost_1_85_0.tar.bz2
          tar -xjf boost_1_85_0.tar.bz2
          echo "BOOST_ROOT=$(pwd)/boost_1_85_0" >> $GITHUB_ENV
      
      - name: Fix C++ headers (add im_assert)
        run: |
          # Добавляем im_assert в core/tools/scope.h
          SCOPE_FILE="core/tools/scope.h"
          if [ -f "$SCOPE_FILE" ]; then
            if ! grep -q "#define im_assert" "$SCOPE_FILE"; then
              cat >> "$SCOPE_FILE" << 'EOF'

// Android fix
#ifndef im_assert
#include <android/log.h>
#include <cstdlib>
#define im_assert(condition) do { \
    if (!(condition)) { \
        __android_log_print(ANDROID_LOG_ERROR, "ICQCore", \
            "Assertion failed: %s:%d: %s", __FILE__, __LINE__, #condition); \
        abort(); \
    } \
} while(0)
#endif
EOF
              echo "✅ Added im_assert to scope.h"
            fi
          else
            echo "⚠️ scope.h not found"
          fi
      
      - name: Create Boost user config for Android
        run: |
          cat > ~/user-config.jam << 'EOF'
          using clang : android : 
            /usr/local/lib/android/sdk/ndk/25.2.9519653/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++ ;
          EOF
      
      - name: Fix permissions
        run: chmod +x gradlew
      
      - name: Build with Boost
        run: |
          ./gradlew :app:assembleDebug --stacktrace
        env:
          BOOST_ROOT: ${{ env.BOOST_ROOT }}
          BOOST_INCLUDEDIR: ${{ env.BOOST_ROOT }}
          CPLUS_INCLUDE_PATH: ${{ env.BOOST_ROOT }}:$CPLUS_INCLUDE_PATH
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk
      
      - name: Upload logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/reports/
            app/.cxx/**/*.log
