    - name: Restore Missing Qt5 Files
      run: |
        pip3 install aqtinstall
        
        # 1. Скачиваем официальный SDK во временную папку
        python3 -m aqt install-qt linux android 5.15.2 android_arm64_v8a -O ./temp_qt
        
        # 2. Копируем недостающие cmake-конфигурации в ваш бандл
        # Это создаст папки Qt5Core, Qt5Network и т.д., которых у вас нет
        cp -r ./temp_qt/5.15.2/android_arm64_v8a/lib/cmake/* ./qt5-bundle/cmake/
        
        # 3. Копируем инструменты хоста (moc, rcc), без которых сборка невозможна
        python3 -m aqt install-qt linux desktop 5.15.2 gcc_64 -O ./temp_qt
        mkdir -p ./qt5-bundle/bin
        cp ./temp_qt/5.15.2/gcc_64/bin/* ./qt5-bundle/bin/
        
        # Удаляем временные файлы
        rm -rf ./temp_qt
        echo "✅ Недостающие файлы (CMake configs & MOC) добавлены в qt5-bundle"
