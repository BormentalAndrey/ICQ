name: Build ICQ for Android

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      arch:
        description: 'Architecture'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - all

env:
  QT_VERSION: '5.15.2'
  ANDROID_API_LEVEL: '33'
  # КРИТИЧЕСКОЕ ИСПРАВЛЕНИЕ: Qt 5.15.2 требует NDK r21. NDK 25+ приведет к ошибкам линковки и отсутствию stdcpp.
  NDK_VERSION: '21.3.6528147'

jobs:
  prepare-android:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      build_date: ${{ steps.get-date.outputs.date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get version
        id: get-version
        run: |
          if [ -f "VERSION" ]; then
            VERSION=$(cat VERSION)
          elif [ -f "version.txt" ]; then
            VERSION=$(cat version.txt)
          else
            VERSION="1.0.0-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Get current date
        id: get-date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

  build-android:
    needs: prepare-android
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(github.event.inputs.arch == 'all' && '["arm64-v8a", "armeabi-v7a", "x86_64"]' || format('["{0}"]', github.event.inputs.arch || 'arm64-v8a')) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Map architecture to Qt arch
        id: map-arch
        run: |
          case "${{ matrix.arch }}" in
            arm64-v8a)
              echo "qt_arch=android_arm64_v8a" >> $GITHUB_OUTPUT
              echo "ndk_abi=arm64-v8a" >> $GITHUB_OUTPUT
              echo "ndk_host=aarch64-linux-android" >> $GITHUB_OUTPUT
              ;;
            armeabi-v7a)
              echo "qt_arch=android_armv7" >> $GITHUB_OUTPUT
              echo "ndk_abi=armeabi-v7a" >> $GITHUB_OUTPUT
              echo "ndk_host=arm-linux-androideabi" >> $GITHUB_OUTPUT
              ;;
            x86_64)
              echo "qt_arch=android_x86_64" >> $GITHUB_OUTPUT
              echo "ndk_abi=x86_64" >> $GITHUB_OUTPUT
              echo "ndk_host=x86_64-linux-android" >> $GITHUB_OUTPUT
              ;;
          esac
          
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temulin'
          
      - name: Install Qt for Android
        run: |
          pip3 install --upgrade aqtinstall
          
          echo "=== Installing Qt $QT_VERSION for Android (${{ steps.map-arch.outputs.qt_arch }}) ==="
          
          python3 -m aqt install-qt linux android $QT_VERSION ${{ steps.map-arch.outputs.qt_arch }} \
            --outputdir ${{ github.workspace }}/Qt \
            --modules \
              qtbase qtdeclarative qtmultimedia qtsvg qtimageformats \
              qtandroidextras qtnetworkauth qtquickcontrols2 qtquickcontrols \
              qtgraphicaleffects qtxmlpatterns
          
          python3 -m aqt install-tool linux android --outputdir ${{ github.workspace }}/Qt android_sdk
          python3 -m aqt install-ndk linux android $NDK_VERSION --outputdir ${{ github.workspace }}/Qt
          
      - name: Set environment variables
        run: |
          echo "QT_ROOT=${{ github.workspace }}/Qt/$QT_VERSION/${{ steps.map-arch.outputs.qt_arch }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${{ github.workspace }}/Qt/Tools/ndk/$NDK_VERSION" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${{ github.workspace }}/Qt/Tools/android-sdk" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential libgl1-mesa-dev libglu1-mesa-dev \
            libxkbcommon-x11-0 libpulse-dev libasound2-dev libssl-dev libxcb-util1 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0
          
      - name: Configure CMake
        run: |
          mkdir -p build-android
          cd build-android
          
          # Убран патчинг CMakeLists. В production предполагается, 
          # что твой CMakeLists.txt уже умеет собираться под Android.
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ steps.map-arch.outputs.ndk_abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_shared \
            -DANDROID_NATIVE_API_LEVEL=21 \
            -DANDROID=ON \
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }} \
            -DQt5_DIR="$QT_ROOT/lib/cmake/Qt5" \
            -DQT_ANDROID_APPLICATION_DIR="${{ github.workspace }}/android" \
            -GNinja
            
      - name: Build Native Libraries
        run: |
          cd build-android
          ninja -v || make -j$(nproc)
          
      - name: Create Deployment Settings
        run: |
          cd build-android
          
          cat > android-deployment-settings.json << EOF
          {
              "description": "ICQ for Android",
              "qt": "$QT_ROOT",
              "sdk": "$ANDROID_SDK_ROOT",
              "ndk": "$ANDROID_NDK_ROOT",
              "toolchain-prefix": "llvm",
              "tool-prefix": "llvm",
              "target-architecture": "${{ steps.map-arch.outputs.ndk_abi }}",
              "ndk-host": "linux-x86_64",
              "stdcpp-path": "$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${{ steps.map-arch.outputs.ndk_host }}/libc++_shared.so",
              "android-package-source": "${{ github.workspace }}/android",
              "application-binary": "${{ github.workspace }}/build-android/libICQ.so",
              "android-package-name": "com.icq.desktop",
              "version-name": "${{ needs.prepare-android.outputs.version }}",
              "version-code": ${{ github.run_number }},
              "deployment-dependencies": [
                  "plugins/platforms/android/libqtforandroid.so"
              ],
              "libraries": [
                  "${{ github.workspace }}/build-android/libICQ.so"
              ],
              "architectures": {
                  "${{ steps.map-arch.outputs.ndk_abi }}": "${{ steps.map-arch.outputs.ndk_host }}"
              },
              "qtArchitecture": "${{ steps.map-arch.outputs.qt_arch }}"
          }
          EOF
          
      - name: Create APK with androiddeployqt
        run: |
          cd build-android
          
          $QT_ROOT/bin/androiddeployqt \
            --input android-deployment-settings.json \
            --output android-build \
            --deployment bundled \
            --android-platform android-$ANDROID_API_LEVEL \
            --jdk $JAVA_HOME \
            --gradle \
            ${{ github.event.inputs.build_type == 'release' && '--release' || '--debug' }}
            
          APK_FILE=$(find android-build -name "*.apk" | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" ../icq-android-${{ matrix.arch }}-${{ github.event.inputs.build_type || 'debug' }}.apk
            echo "✅ APK created successfully"
          else
            echo "❌ APK not found. Check androiddeployqt logs above."
            exit 1
          fi
          
      - name: Generate build info
        run: |
          cat > build-info-${{ matrix.arch }}.txt << EOF
          ICQ Android Build Information
          =============================
          Version: ${{ needs.prepare-android.outputs.version }}
          Build Date: $(date)
          Commit: ${{ github.sha }}
          Architecture: ${{ matrix.arch }}
          Qt Arch: ${{ steps.map-arch.outputs.qt_arch }}
          Build Type: ${{ github.event.inputs.build_type || 'debug' }}
          Build Number: ${{ github.run_number }}
          EOF
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: icq-android-${{ matrix.arch }}-${{ github.event.inputs.build_type || 'debug' }}
          path: |
            icq-android-${{ matrix.arch }}-${{ github.event.inputs.build_type || 'debug' }}.apk
            build-info-${{ matrix.arch }}.txt
          retention-days: 30

  create-release:
    needs: [prepare-android, build-android]
    if: startsWith(github.ref, 'refs/tags/v') && success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ICQ Android ${{ needs.prepare-android.outputs.version }}
          body: |
            ## 📱 ICQ для Android v${{ needs.prepare-android.outputs.version }}
            
            ### О сборке
            Это порт оригинального ICQ Desktop на Android.
            
            ### 🎯 Поддерживаемые архитектуры:
            - **ARM64-v8a** (современные устройства)
            - **ARMv7-a** (старые устройства)
            - **x86_64** (эмуляторы, планшеты)
            
            ### ✨ Спецификации сборки:
            - Qt: 5.15.2
            - Минимальная версия Android: 5.0 (API 21)
            - Целевая версия: Android 13 (API 33)
            
            ---
            Сборка: ${{ needs.prepare-android.outputs.build_date }}
            Коммит: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
