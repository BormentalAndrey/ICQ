# .github/workflows/assemble-qt-bundle.yml
name: Assemble Qt5 Bundle

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble Qt5 bundle from parts
        run: |
          echo "Сборка Qt5 бандла из частей..."
          
          # Собираем архив из частей
          cat qt5-bundle.part.* > qt5-bundle.tar.gz
          
          echo "Архив собран:"
          ls -lh qt5-bundle.tar.gz

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: qt5-bundle
          path: qt5-bundle.tar.gz
          retention-days: 30
