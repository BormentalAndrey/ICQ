name: Build ICQ for Android

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      arch:
        description: 'Architecture'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - all

jobs:
  prepare-android:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      build_date: ${{ steps.get-date.outputs.date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get version
        id: get-version
        run: |
          if [ -f "VERSION" ]; then
            VERSION=$(cat VERSION)
          elif [ -f "version.txt" ]; then
            VERSION=$(cat version.txt)
          else
            VERSION="1.0.0-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Get current date
        id: get-date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        
      - name: Setup Android project structure
        run: |
          mkdir -p android/res/values
          mkdir -p android/res/drawable
          
      - name: Generate AndroidManifest.xml
        run: |
          cat > android/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.icq.desktop"
              android:versionCode="${{ github.run_number }}"
              android:versionName="${{ steps.get-version.outputs.version }}">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="ICQ"
                  android:theme="@android:style/Theme.Holo.Light"
                  android:name="android.app.NativeActivity"
                  android:supportsRtl="true">

                  <activity
                      android:name="android.app.NativeActivity"
                      android:configChanges="orientation|keyboardHidden|screenSize|screenLayout|smallestScreenSize|uiMode"
                      android:launchMode="singleTop"
                      android:windowSoftInputMode="adjustResize"
                      android:exported="true">
                      
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      
                      <meta-data
                          android:name="android.app.lib_name"
                          android:value="ICQ" />
                  </activity>
              </application>

              <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="33" />
          </manifest>
          EOF

  build-android:
    needs: prepare-android
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: ${{ fromJSON(github.event.inputs.arch == 'all' && '["arm64-v8a", "armeabi-v7a", "x86_64"]' || format('["{0}"]', github.event.inputs.arch || 'arm64-v8a')) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install Qt for Android (manual method)
        run: |
          # Устанавливаем aqt
          pip3 install aqtinstall
          
          # Получаем список доступных архитектур
          echo "Available Android architectures for Qt 5.15.2:"
          python3 -m aqt list-qt linux android --arch 5.15.2
          
          # Устанавливаем Qt базовые модули для Android
          python3 -m aqt install-qt linux android 5.15.2 android_arm64_v8a \
            --outputdir ${{ github.workspace }}/Qt \
            --modules android_arm64_v8a qtbase qtdeclarative qtmultimedia qtsvg qtimageformats qtandroidextras qtnetworkauth
          
          # Устанавливаем дополнительные тулзы
          python3 -m aqt install-tool linux android android_sdk
          
          # Устанавливаем NDK
          python3 -m aqt install-ndk linux android 25.2.9519653
          
      - name: Set Qt environment variables
        run: |
          echo "QT_ROOT=${{ github.workspace }}/Qt/5.15.2/android_arm64_v8a" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${{ github.workspace }}/Qt/Tools/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${{ github.workspace }}/Qt/Tools/android-sdk" >> $GITHUB_ENV
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxkbcommon-x11-0 \
            libpulse-dev \
            libasound2-dev \
            libssl-dev \
            libxcb-util1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0
          
      - name: Patch CMakeLists.txt for Android
        run: |
          if [ ! -f "CMakeLists.txt" ]; then
            echo "❌ CMakeLists.txt not found!"
            exit 1
          fi
          
          # Создаем резервную копию
          cp CMakeLists.txt CMakeLists.txt.original
          
          # Добавляем Android поддержку если её нет
          if ! grep -q "ANDROID" CMakeLists.txt; then
            cat >> CMakeLists.txt << 'EOF'

# Android support
if(ANDROID)
    set(ICQ_PLATFORM android)
    message(STATUS "Building for Android platform")
    
    add_definitions(-DANDROID -DQT_ANDROID)
    set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -funwind-tables -fPIC")
    
    # Find Qt components
    find_package(Qt5 COMPONENTS Core AndroidExtras Multimedia Network REQUIRED)
    
    # Android specific libraries
    set(ANDROID_LIBRARIES
        -lOpenSLES
        -landroid
        -lEGL
        -lGLESv2
        -llog
    )
    
    # Set rpath for Android
    set(CMAKE_SHARED_LINKER_FLAGS "${CMAKE_SHARED_LINKER_FLAGS} -Wl,-rpath-link=${CMAKE_SOURCE_DIR}/build-android/lib")
endif()
EOF
            echo "✅ Android support added to CMakeLists.txt"
          else
            echo "ℹ️ Android support already exists"
          fi
          
      - name: Configure CMake for Android (${{ matrix.arch }})
        run: |
          mkdir -p build-android-${{ matrix.arch }}
          cd build-android-${{ matrix.arch }}
          
          # Определяем ABI
          case "${{ matrix.arch }}" in
            arm64-v8a)
              ABI="arm64-v8a"
              QT_ARCH="android_arm64_v8a"
              ;;
            armeabi-v7a)
              ABI="armeabi-v7a"
              QT_ARCH="android_armv7"
              ;;
            x86_64)
              ABI="x86_64"
              QT_ARCH="android_x86_64"
              ;;
            *)
              ABI="arm64-v8a"
              QT_ARCH="android_arm64_v8a"
              ;;
          esac
          
          # Конфигурируем CMake
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=$ABI \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_shared \
            -DANDROID_NATIVE_API_LEVEL=21 \
            -DIM_QT_DYNAMIC=ON \
            -DANDROID=ON \
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }} \
            -DQt5_DIR="$QT_ROOT/lib/cmake/Qt5" \
            -GNinja
            
      - name: Build native libraries (${{ matrix.arch }})
        run: |
          cd build-android-${{ matrix.arch }}
          ninja -v || make -j$(nproc)
          
      - name: Prepare APK structure
        run: |
          cd build-android-${{ matrix.arch }}
          
          # Создаем структуру для APK
          mkdir -p android-build/libs/${{ matrix.arch }}
          mkdir -p android-build/res
          mkdir -p android-build/assets
          
          # Копируем библиотеку
          find . -name "*.so" -exec cp {} android-build/libs/${{ matrix.arch }}/ \;
          
          # Копируем Android ресурсы
          cp -r ../android/* android-build/ 2>/dev/null || true
          
          # Создаем простой AndroidManifest.xml если его нет
          if [ ! -f "android-build/AndroidManifest.xml" ]; then
            cp ../android/AndroidManifest.xml android-build/
          fi
          
      - name: Create APK with aapt
        run: |
          cd build-android-${{ matrix.arch }}
          
          # Используем aapt для создания APK
          $ANDROID_SDK_ROOT/build-tools/33.0.0/aapt package -f -F icq-unaligned.apk \
            -M android-build/AndroidManifest.xml \
            -S android-build/res \
            -A android-build/assets \
            -I $ANDROID_SDK_ROOT/platforms/android-33/android.jar
            
          # Добавляем библиотеки в APK
          cd android-build
          zip -r ../icq-unaligned.apk lib
          cd ..
          
          # Выравниваем APK
          $ANDROID_SDK_ROOT/build-tools/33.0.0/zipalign -f -p 4 icq-unaligned.apk icq-aligned.apk
          
          # Копируем финальный APK
          cp icq-aligned.apk ../icq-android-${{ matrix.arch }}.apk
          
      - name: Generate build info
        run: |
          cat > build-info-${{ matrix.arch }}.txt << EOF
          ICQ Android Build Information
          =============================
          Version: ${{ needs.prepare-android.outputs.version }}
          Build Date: ${{ needs.prepare-android.outputs.build_date }}
          Commit: ${{ github.sha }}
          Architecture: ${{ matrix.arch }}
          Build Type: ${{ github.event.inputs.build_type || 'debug' }}
          Build Number: ${{ github.run_number }}
          
          Environment:
          - Qt Version: 5.15.2
          - NDK Version: 25.2.9519653
          - Android SDK: 33
          - CMake: $(cmake --version | head -1)
          - Ninja: $(ninja --version)
          EOF
          
      - name: Upload APK artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: icq-android-${{ matrix.arch }}-${{ github.event.inputs.build_type || 'debug' }}
          path: |
            icq-android-${{ matrix.arch }}.apk
            build-info-${{ matrix.arch }}.txt
          retention-days: 30

  create-release:
    needs: [prepare-android, build-android]
    if: startsWith(github.ref, 'refs/tags/v') && success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ICQ Android ${{ needs.prepare-android.outputs.version }}
          body: |
            ## 🎉 ICQ для Android v${{ needs.prepare-android.outputs.version }}
            
            Официальный порт оригинального ICQ Desktop 2016 года на Android!
            
            ### 📱 Поддерживаемые архитектуры:
            - ARM64-v8a
            - ARMv7-a
            - x86_64
            
            ### ✨ Особенности сборки:
            - Оригинальный код ICQ 2016
            - Qt 5.15.2
            - Android API 21+
            
            ### 📥 Установка:
            1. Скачайте APK для вашей архитектуры
            2. Разрешите установку из неизвестных источников
            3. Установите и наслаждайтесь!
            
            ### ⚠️ Примечание:
            Это экспериментальная сборка. Некоторые функции могут работать некорректно.
            
            ### 🔧 Технические детали:
            - Версия: ${{ needs.prepare-android.outputs.version }}
            - Сборка: ${{ needs.prepare-android.outputs.build_date }}
            - Коммит: ${{ github.sha }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
