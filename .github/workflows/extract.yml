name: Android CI Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Репозитория
        uses: actions/checkout@v4

      - name: Установка Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Установка Android SDK и NDK
        uses: android-actions/setup-android@v3
        with:
          # Указываем NDK, который прописан у вас в build.gradle.kts
          ndk-version: "26.1.10909125"

      # ВАЖНО: Если Qt и OpenSSL не в репозитории, здесь должен быть шаг их загрузки.
      # Если они лежат в папках в корне проекта, проверяем их наличие.
      - name: Проверка зависимостей (Qt & OpenSSL)
        run: |
          ls -d Qt/android_arm64_v8a || echo "Внимание: Папка Qt не найдена!"
          ls -d Openssl-android-arm64/arm64-v8a || echo "Внимание: Папка OpenSSL не найдена!"

      - name: Разрешение на выполнение gradlew
        run: chmod +x gradlew

      - name: Сборка проекта (Assemble Release)
        run: ./gradlew assembleRelease --stacktrace
        # Мы используем continue-on-error: false, чтобы билд падал при ошибке, 
        # но шаг выгрузки артефактов ниже сработает в любом случае.

      - name: Сбор Артефактов (Логи сборки)
        if: always() # Выполнять даже если сборка упала
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports/
            **/build/test-results/
            **/.cxx/
            build.log
          retention-days: 5

      - name: Сбор Артефактов (APK)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
