name: Download Dependencies Only

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  download-deps:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install aqtinstall
        run: pip3 install aqtinstall

      - name: Download Qt 6.5.0 (Android & Desktop Tools)
        run: |
          # Создаем папку Qt в корне репозитория
          mkdir -p ${{ github.workspace }}/Qt
          
          # Скачиваем библиотеки для Android (arm64-v8a)
          python3 -m aqt install-qt linux android 6.5.0 android_arm64_v8a --outputdir ${{ github.workspace }}/Qt
          
          # Скачиваем инструменты для Linux (moc, rcc, uic)
          python3 -m aqt install-qt linux desktop 6.5.0 gcc_64 --outputdir ${{ github.workspace }}/Qt
          
          echo "✅ Qt 6.5.0 скачан в папку ${{ github.workspace }}/Qt"

      - name: Download Boost 1.83.0
        run: |
          # Скачиваем и распаковываем Boost в корень
          wget -q https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.gz
          tar -xzf boost_1_83_0.tar.gz
          rm boost_1_83_0.tar.gz
          echo "✅ Boost 1.83.0 скачан в папку ${{ github.workspace }}/boost_1_83_0"

      - name: Download RapidJSON
        run: |
          # Клонируем RapidJSON в корень
          git clone --depth 1 https://github.com/Tencent/rapidjson.git
          echo "✅ RapidJSON скачан в папку ${{ github.workspace }}/rapidjson"

      - name: Verify Downloads
        run: |
          echo "--- Содержимое репозитория после загрузки ---"
          ls -d Qt/6.5.0/*
          ls -d boost_1_83_0
          ls -d rapidjson
          echo "--- Проверка инструментов Qt (MOC) ---"
          ls -la ${{ github.workspace }}/Qt/6.5.0/gcc_64/bin/moc

      # Опционально: загрузить всё скачанное как артефакт, чтобы вы могли скачать это архивом из GitHub
      - name: Upload Dependencies as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-dependencies
          path: |
            ${{ github.workspace }}/Qt
            ${{ github.workspace }}/boost_1_83_0
            ${{ github.workspace }}/rapidjson
          retention-days: 1
