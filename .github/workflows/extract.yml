# .github/workflows/assemble-qt-bundle.yml
name: Assemble Qt5 Bundle from Parts

on:
  push:
    branches: [ main, master ]
    paths:
      - 'qt5-bundle.part.*'
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble Qt5 bundle from parts
        run: |
          echo "========================================="
          echo "СБОРКА Qt5 БАНДЛА ИЗ ЧАСТЕЙ"
          echo "========================================="
          
          # Находим все части
          echo ""
          echo "📁 Найденные части:"
          ls -la qt5-bundle.part.*
          
          # Собираем архив
          echo ""
          echo "🔧 Собираем архив из частей..."
          cat qt5-bundle.part.* > qt5-bundle.tar.gz
          
          # Проверяем
          echo ""
          echo "✅ Архив собран!"
          ls -lh qt5-bundle.tar.gz
          
          # Проверяем целостность
          echo ""
          echo "🔍 Проверяем архив..."
          if tar -tzf qt5-bundle.tar.gz > /dev/null 2>&1; then
            echo "   ✅ Архив корректный"
            echo "   📄 Файлов: $(tar -tzf qt5-bundle.tar.gz | wc -l)"
          else
            echo "   ❌ Архив поврежден!"
            exit 1
          fi

      - name: Upload assembled archive
        uses: actions/upload-artifact@v4
        with:
          name: qt5-bundle-assembled
          path: qt5-bundle.tar.gz
          retention-days: 30

      - name: Create Release (if tag exists)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: qt5-bundle.tar.gz
          name: Qt5 Bundle ${{ github.ref_name }}
          body: |
            Qt5 5.15.18 Bundle for Android/Termux builds
            
            ## Содержимое:
            - QtCore, QtGui, QtWidgets, QtNetwork
            - qmake, moc, rcc, uic
            - CMake configuration
            
            ## Использование:
            ```yaml
            - name: Download Qt5 bundle
              run: |
                wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/qt5-bundle.tar.gz
                tar -xzf qt5-bundle.tar.gz
                echo "Qt5_DIR=$(pwd)/qt5-bundle/cmake/Qt5" >> $GITHUB_ENV
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up parts (optional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo ""
          echo "🧹 Очистка частей архива..."
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git rm qt5-bundle.part.* || true
          git commit -m "🧹 Clean up Qt5 bundle parts after assembly" || true
          git push || true
          echo "✅ Части удалены из репозитория"
