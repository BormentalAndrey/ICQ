name: Android Production Build

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java & Python
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install aqtinstall
        run: pip3 install aqtinstall

      - name: Restore Missing Qt5 Files
        run: |
          mkdir -p ./temp_qt
          
          # 1. Загружаем официальный SDK. 
          # В 5.15.2 архитектура для aqt называется 'android_arm64_v8a' (через подчеркивание)
          # Используем флаг -m (module), чтобы избежать ошибки qt_base
          echo "Downloading Android SDK components..."
          python3 -m aqt install-qt linux android 5.15.2 android_arm64_v8a -O ./temp_qt -m qtbase qtdeclarative
          
          # 2. Загружаем инструменты Хоста (MOC, RCC)
          echo "Downloading Desktop tools..."
          python3 -m aqt install-qt linux desktop 5.15.2 gcc_64 -O ./temp_qt -m qtbase
          
          # 3. Интеграция в ваш qt5-bundle
          echo "Integrating CMake configurations..."
          # Копируем всё содержимое из скачанной папки cmake в ваш бандл
          # Путь в aqt: <output>/<version>/<arch>/lib/cmake
          cp -r ./temp_qt/5.15.2/android_arm64_v8a/lib/cmake/* ./qt5-bundle/cmake/
          
          # 4. Копируем инструменты сборки
          mkdir -p ./qt5-bundle/bin
          cp ./temp_qt/5.15.2/gcc_64/bin/moc ./qt5-bundle/bin/
          cp ./temp_qt/5.15.2/gcc_64/bin/rcc ./qt5-bundle/bin/
          cp ./temp_qt/5.15.2/gcc_64/bin/uic ./qt5-bundle/bin/
          chmod +x ./qt5-bundle/bin/*
          
          # Проверка результата
          ls -la ./qt5-bundle/cmake/Qt5Core/Qt5CoreConfig.cmake || echo "Warning: Core config not found"
          
          rm -rf ./temp_qt
          echo "✅ Missing Qt5 components integrated successfully"

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'

      - name: Run Windows-to-Android Refactor
        run: |
          if [ -f "auto_refactor.py" ]; then
            python3 auto_refactor.py --apply
          fi
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Build APK with Gradle
        run: |
          chmod +x gradlew
          
          # Добавляем наш bin с MOC в системный PATH
          export PATH=${{ github.workspace }}/qt5-bundle/bin:$PATH
          
          # Сборка
          ./gradlew :app:assembleDebug \
            -Pqt.android.path=${{ github.workspace }}/qt5-bundle \
            -Pandroid.ndkpath=$ANDROID_HOME/ndk/26.1.10909125 \
            --stacktrace
        env:
          # Явные указатели для CMake внутри Gradle
          CMAKE_PREFIX_PATH: ${{ github.workspace }}/qt5-bundle/cmake/Qt5
          Qt5_DIR: ${{ github.workspace }}/qt5-bundle/cmake/Qt5

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-production
          path: app/build/outputs/apk/debug/*.apk
          
