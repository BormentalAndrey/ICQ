- name: Install Qt 6.5.0 (desktop + Android arm64)
  uses: jurplel/install-qt-action@v4
  with:
    version: '6.5.0'
    host: 'linux'
    # Сначала desktop (нужен для qmake, androiddeployqt и т.д.)
    target: 'desktop'
    arch: 'gcc_64'
    dir: '${{ github.workspace }}/Qt'

- name: Install Qt 6.5.0 Android arm64_v8a
  uses: jurplel/install-qt-action@v4
  with:
    version: '6.5.0'
    host: 'linux'
    target: 'android'
    arch: 'android_arm64_v8a'
    dir: '${{ github.workspace }}/Qt'
    # Если нужны дополнительные модули — раскомментируй
    # modules: 'qtnetwork qt5compat'   # qtbase уже включён по умолчанию

- name: Set Qt environment variables (для CMake / Gradle)
  run: |
    echo "QT_ANDROID_PATH=${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a" >> $GITHUB_ENV
    echo "QT_HOST_PATH=${{ github.workspace }}/Qt/6.5.0/gcc_64" >> $GITHUB_ENV
    echo "Qt6_DIR=${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a/lib/cmake/Qt6" >> $GITHUB_ENV
    echo "CMAKE_PREFIX_PATH=${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a/lib/cmake" >> $GITHUB_ENV

- name: Verify Qt was installed correctly
  run: |
    echo "Desktop Qt cmake:"
    ls -la ${{ github.workspace }}/Qt/6.5.0/gcc_64/lib/cmake/Qt6/ || echo "Desktop cmake missing"
    
    echo ""
    echo "Android Qt cmake:"
    ls -la ${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a/lib/cmake/Qt6/ || echo "Android cmake missing"
    
    find ${{ github.workspace }}/Qt -name Qt6Config.cmake -print || echo "Qt6Config.cmake not found anywhere"
