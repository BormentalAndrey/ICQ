name: "Dzin: Production Source Repair"

on:
  workflow_dispatch: # Запуск вручную из вкладки Actions

permissions:
  contents: write
  pull-requests: write

jobs:
  repair-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠 Fix config.cpp (Smart Syntax)
        shell: python
        run: |
          import os
          import re

          file_path = "common.shared/config/config.cpp"
          if os.path.exists(file_path):
              with open(file_path, 'r', encoding='utf-8') as f:
                  lines = f.readlines()

              new_lines = []
              # Регулярное выражение для поиска строк с std::pair или сломанными скобками
              # Ищет: { КЛЮЧ, ЗНАЧЕНИЕ ) ) или std::pair( КЛЮЧ, ЗНАЧЕНИЕ )
              pattern = re.compile(r'(?:std::pair\s*\(\s*|\{\s*)(?P<key>[a-zA-Z0-9_:]+)\s*,\s*(?P<val>get_[a-z]+\([^)]+\))(?:\s*\)\s*\)?|\s*\})')

              for line in lines:
                  # Если в строке есть ключ из перечислений (features, urls, values)
                  if any(x in line for x in ["features::", "urls::", "values::", "translations::"]):
                      # Принудительно приводим к формату { KEY, VALUE },
                      fixed = pattern.sub(r'{ \g<key>, \g<val> }', line)
                      # Убираем возможные двойные запятые или скобки в конце
                      fixed = fixed.replace(')),', ' },').replace('));', ' };').replace('},,', '},')
                      new_lines.append(fixed)
                  else:
                      new_lines.append(line)

              with open(file_path, 'w', encoding='utf-8') as f:
                  f.writelines(new_lines)
              print("✓ config.cpp syntax cleaned and unified.")

      - name: 🛠 Fix common.h (Constants & Types)
        run: |
          FILE="common.shared/common.h"
          if [ -f "$FILE" ]; then
            # Меняем типы на unsigned long long для совместимости с size_t
            sed -i 's/unsigned long BYTE/unsigned long long BYTE/g' "$FILE"
            sed -i 's/unsigned long KILOBYTE/unsigned long long KILOBYTE/g' "$FILE"
            sed -i 's/unsigned long MEGABYTE/unsigned long long MEGABYTE/g' "$FILE"
            sed -i 's/unsigned long GIGABYTE/unsigned long long GIGABYTE/g' "$FILE"
            # Очищаем старые приведения типов, если они были сделаны криво
            sed -i 's/static_cast<long long>(MEGABYTE)/MEGABYTE/g' "$FILE"
            echo "✓ common.h type safety improved."
          fi

      - name: 🛠 Fix binary_stream.h (Sign-Compare)
        run: |
          FILE="core/tools/binary_stream.h"
          if [ -f "$FILE" ]; then
            sed -i 's/size_need > buffer_.size()/static_cast<size_t>(size_need) > buffer_.size()/g' "$FILE"
            echo "✓ binary_stream.h fixed."
          fi

      - name: Commit and Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          BRANCH="fix/build-repair-$(date +%s)"
          git checkout -b "$BRANCH"
          git add .
          
          if git diff --cached --quiet; then
            echo "No changes needed."
          else
            git commit -m "build: clean repair of config.cpp and type mismatches"
            git push origin "$BRANCH"
            gh pr create \
              --title "🔧 Production Fix: Сборка Дзинь" \
              --body "Этот PR исправляет синтаксис в config.cpp и убирает ошибки sign-compare." \
              --head "$BRANCH" \
              --base main
          fi
          
