# .github/workflows/extract-zip-archives.yml
name: Extract ZIP Archives

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and extract all ZIP files
        run: |
          echo "ПОИСК И РАСПАКОВКА ZIP АРХИВОВ"
          
          find . -type f -name "*.zip" | while read archive; do
            echo ""
            echo "📦 Архив: $archive"
            
            dir=$(dirname "$archive")
            cd "$dir"
            
            unzip -o "$(basename "$archive")"
            
            cd - > /dev/null
            echo "✅ Распаковано"
          done

      - name: Remove ZIP archives
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          find . -type f -name "*.zip" -exec git rm {} \;
          
          git add -A
          git commit -m "Extract and remove ZIP archives" || echo "No changes"
          git push
