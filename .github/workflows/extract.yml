name: Auto-fix Compilation Errors

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Ветка для создания PR'
        required: false
        default: 'main'
        type: string

jobs:
  fix-and-propose:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Нужно для корректного ребейза
          
      - name: Setup Git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Setup Clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14
          sudo ln -sf /usr/bin/clang-format-14 /usr/bin/clang-format
          
      - name: Create unique fix branch
        run: |
          BRANCH_NAME="fix/build-repair-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          
      - name: 🛠 Fix config.cpp (Struct Initializer Error)
        run: |
          FILE="common.shared/config/config.cpp"
          if [ -f "$FILE" ]; then
            # Исправляем ошибку в строке 247 и похожих (std::pair -> {})
            sed -i 's/std::pair(features::report_messages_enabled,/{ features::report_messages_enabled,/' "$FILE"
            sed -i '/features::report_messages_enabled/s/)),/},/' "$FILE"
            echo "✓ config.cpp patched"
          fi
          
      - name: 🛠 Fix curl_handler.h (Android NDK Path)
        run: |
          FILE="core/curl_handler.h"
          if [ -f "$FILE" ]; then
            # Заменяем обычный инклуд на кроссплатформенный
            sed -i 's/#include <curl.h>/#ifdef __ANDROID__\n#  include <curl\/curl.h>\n#else\n#  include <curl.h>\n#endif/' "$FILE"
            echo "✓ curl_handler.h patched"
          fi
          
      - name: 🛠 Fix binary_stream.h (Sign-compare Warnings)
        run: |
          FILE="core/tools/binary_stream.h"
          if [ -f "$FILE" ]; then
            sed -i 's/buffer_.size() < _size/buffer_.size() < static_cast<size_t>(_size)/g' "$FILE"
            sed -i 's/size_need > buffer_.size()/static_cast<size_t>(size_need) > buffer_.size()/g' "$FILE"
            echo "✓ binary_stream.h patched"
          fi

      - name: 🛠 Fix Qt6 StringComparator
        run: |
          FILE="gui/utils/StringComparator.h"
          if [ -f "$FILE" ]; then
            sed -i '1i#include <QStringRef>\n#include <QLatin1String>' "$FILE"
            sed -i 's/\bql1s\b/QLatin1String/g' "$FILE"
            echo "✓ StringComparator.h patched"
          fi
          
      - name: Apply Formatting
        run: |
          # Форматируем только измененные файлы
          git diff --name-only | grep -E '\.(cpp|h|hpp)$' | xargs -r clang-format -i
          git add .
          
      - name: Finalize Changes and Push
        id: push_step
        run: |
          if git diff --cached --quiet; then
            echo "SKIPPED=true" >> $GITHUB_OUTPUT
          else
            git commit -m "build: auto-fix compilation errors (Qt6/Android)"
            
            # РЕШЕНИЕ КОНФЛИКТА: делаем pull с ребейзом перед отправкой
            # Если BormentalAndrey что-то запушил, наши правки встанут сверху
            git pull --rebase origin ${{ github.event.inputs.target_branch || 'main' }}
            
            git push origin HEAD:${{ env.BRANCH_NAME }}
            echo "SKIPPED=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Create Pull Request
        if: steps.push_step.outputs.SKIPPED == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const target = `${{ github.event.inputs.target_branch || 'main' }}`;
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔧 Auto-fix: Compilation errors (Dzin Core)',
              body: 'Автоматическое исправление ошибок инициализации структур, путей curl и Qt6 типов. Проверено clang-format.',
              head: process.env.BRANCH_NAME,
              base: target
            });
            
