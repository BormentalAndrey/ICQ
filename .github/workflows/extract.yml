# .github/workflows/assemble-dependencies.yml
name: Assemble ICQ Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and assemble
        run: |
          echo "Поиск частей..."
          ls -la
          echo ""
          
          if ls icq-dependencies.part.* 1> /dev/null 2>&1; then
            echo "Сборка архива..."
            cat icq-dependencies.part.* > icq-dependencies.zip
            ls -lh icq-dependencies.zip
          else
            echo "Части не найдены"
            exit 1
          fi

      - name: Commit
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git rm -f icq-dependencies.part.* || true
          git add icq-dependencies.zip
          git commit -m "Assemble ICQ dependencies" || echo "Нет изменений"
          git push
