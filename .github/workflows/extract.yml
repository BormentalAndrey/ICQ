name: Build ICQ Mobile with Qt

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'
          cmdline-tools-version: 'latest'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            cmake \
            ninja-build \
            build-essential \
            libgl1-mesa-dev \
            python3-pip

      - name: Install aqtinstall (Qt Downloader)
        run: pip install aqtinstall

      - name: Install Qt 6.5.0 for Android & Linux
        run: |
          # Используем --outputdir вместо -o
          aqt install-qt linux android 6.5.0 android_arm64_v8a --outputdir ${{ github.workspace }}/Qt
          
          # Устанавливаем Host-инструменты (нужны для компилятора moc, rcc)
          aqt install-qt linux desktop 6.5.0 gcc_64 --outputdir ${{ github.workspace }}/Qt

      - name: Setup Boost 1.83.0
        run: |
          if [ ! -d "boost_1_83_0" ]; then
            echo "Downloading Boost..."
            wget -q https://boostorg.jfrog.io/artifactory/main/release/1.83.0/source/boost_1_83_0.tar.gz
            tar -xzf boost_1_83_0.tar.gz
          fi
          echo "BOOST_ROOT=${{ github.workspace }}/boost_1_83_0" >> $GITHUB_ENV

      - name: Setup RapidJSON
        run: |
          if [ ! -d "rapidjson" ]; then
            git clone --depth 1 https://github.com/Tencent/rapidjson.git
          fi
          echo "RAPIDJSON_ROOT=${{ github.workspace }}/rapidjson/include" >> $GITHUB_ENV

      - name: Fix permissions
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          # Мы передаем пути через -P (Project Properties), 
          # так как Gradle в CI часто изолирует переменные окружения от CMake
          ./gradlew :app:assembleDebug \
            -Pqt.android.path="${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a" \
            -Pqt.host.path="${{ github.workspace }}/Qt/6.5.0/gcc_64" \
            -Pboost.root="${{ github.workspace }}/boost_1_83_0" \
            -Prapidjson.root="${{ github.workspace }}/rapidjson/include" \
            --stacktrace 2>&1 | tee build.log

      - name: Save build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Native Reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cxx-logs
          path: |
            app/.cxx/**/*.log
            app/build/reports/
            
