name: Build ICQ Mobile

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      
      - name: Create missing wrapper files
        run: |
          mkdir -p gradle/wrapper
          # Создаем properties если нет
          if [ ! -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
            distributionBase=GRADLE_USER_HOME
            distributionPath=wrapper/dists
            distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-all.zip
            zipStoreBase=GRADLE_USER_HOME
            zipStorePath=wrapper/dists
            EOF
          fi
          # Скачиваем jar если нет
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x gradlew
      
      - name: Build Android APK
        run: |
          # Gradle сам соберет и native часть с правильным toolchain
          ./gradlew :app:assembleRelease --stacktrace
        env:
          ANDROID_NDK: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile
          path: app/build/outputs/apk/release/*.apk
