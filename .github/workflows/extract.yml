# .github/workflows/extract-zip-archives.yml
name: Extract ZIP Archives

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: List all files
        run: |
          echo "Все файлы в репозитории:"
          ls -la
          echo ""
          echo "Поиск zip файлов:"
          find . -name "*.zip" -type f

      - name: Extract zip files
        run: |
          # Находим и распаковываем
          for file in $(find . -name "*.zip" -type f); do
            echo "Распаковка: $file"
            unzip -o "$file" -d "$(dirname "$file")"
            rm -f "$file"
          done

      - name: Push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Extract zip archives" || echo "No changes"
          git push
