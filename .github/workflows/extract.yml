name: Download Dependencies Only

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  download-deps:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install aqtinstall
        run: pip3 install aqtinstall

      - name: Download Qt 6.5.0
        run: |
          mkdir -p ${{ github.workspace }}/Qt
          
          # Установка Android версии (библиотеки)
          python3 -m aqt install-qt linux android 6.5.0 android_arm64_v8a --outputdir ${{ github.workspace }}/Qt
          
          # Установка Desktop версии (инструменты MOC, RCC)
          # В Qt 6.5 инструменты хоста часто идут в комплекте с десктопной версией
          python3 -m aqt install-qt linux desktop 6.5.0 gcc_64 --outputdir ${{ github.workspace }}/Qt

      - name: Download Boost 1.83.0
        run: |
          # Используем более надежное зеркало
          wget -q https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.gz
          tar -xzf boost_1_83_0.tar.gz
          rm boost_1_83_0.tar.gz

      - name: Download RapidJSON
        run: |
          git clone --depth 1 https://github.com/Tencent/rapidjson.git

      - name: Verify and Fix Paths
        run: |
          echo "--- Проверка структуры Qt ---"
          find ${{ github.workspace }}/Qt -name "moc"
          
          # Пытаемся найти, где на самом деле лежит moc и выводим это
          MOC_PATH=$(find ${{ github.workspace }}/Qt -name "moc" -type f | head -n 1)
          if [ -z "$MOC_PATH" ]; then
            echo "❌ Ошибка: moc не найден!"
            exit 1
          else
            echo "✅ moc найден по адресу: $MOC_PATH"
          fi

      - name: Upload Dependencies
        uses: actions/upload-artifact@v4
        with:
          name: icq-dependencies
          path: |
            ${{ github.workspace }}/Qt
            ${{ github.workspace }}/boost_1_83_0
            ${{ github.workspace }}/rapidjson
          retention-days: 1
