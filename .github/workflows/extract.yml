# .github/workflows/assemble-qt-bundle.yml
name: Assemble Qt5 Bundle

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble Qt5 bundle from parts
        run: |
          echo "Сборка Qt5 бандла из частей..."
          
          # Собираем архив из частей
          cat qt5-bundle.part.* > qt5-bundle.tar.gz
          
          echo "Архив собран:"
          ls -lh qt5-bundle.tar.gz

      - name: Commit and push archive
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Добавляем архив
          git add qt5-bundle.tar.gz
          
          # Удаляем части
          git rm qt5-bundle.part.* 2>/dev/null || true
          
          # Коммитим
          git commit -m "Assemble Qt5 bundle from parts" || echo "Нет изменений"
          
          # Пушим
          git push
