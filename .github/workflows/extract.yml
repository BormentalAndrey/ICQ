name: Build ICQ Mobile

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1 # Ускоряет чекаут

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' # Кэширует зависимости Gradle автоматически

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          # Версия NDK обновлена в соответствии с логом Gradle
          packages: 'ndk;26.1.10909125'

      - name: Cache Boost
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost_1_85_0
          key: ${{ runner.os }}-boost-1.85.0

      - name: Download Boost (if not cached)
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          wget -q https://archives.boost.io/release/1.85.0/source/boost_1_85_0.tar.bz2
          tar -xjf boost_1_85_0.tar.bz2

      - name: Download RapidJSON
        run: |
          # Скачиваем недостающую зависимость rapidjson
          git clone https://github.com/Tencent/rapidjson.git ${{ github.workspace }}/rapidjson
          echo "RAPIDJSON_ROOT=${{ github.workspace }}/rapidjson/include" >> $GITHUB_ENV

      - name: Set Boost Path
        run: |
          echo "BOOST_ROOT=${{ github.workspace }}/boost_1_85_0" >> $GITHUB_ENV

      - name: Fix permissions
        run: chmod +x gradlew

      - name: Build with Boost headers
        run: ./gradlew :app:assembleDebug --stacktrace
        env:
          BOOST_ROOT: ${{ env.BOOST_ROOT }}
          RAPIDJSON_ROOT: ${{ env.RAPIDJSON_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: icq-debug
          path: app/build/outputs/apk/debug/*.apk
