# .github/workflows/assemble-qt5-core.yml
name: Assemble Qt5 Core Archive

on:
  push:
    branches: [ main, master ]
    paths:
      - 'icq-dependencies.part.aa'
      - 'icq-dependencies.part.ab'
      - 'icq-dependencies.part.ac'
      - 'icq-dependencies.part.ad'
      - 'icq-dependencies.part.ae'
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble qt5-core.zip
        run: |
          echo "========================================="
          echo "СБОРКА QT5-CORE.ZIP"
          echo "========================================="
          
          # Проверяем наличие частей
          echo "Проверка частей:"
          ls -la icq-dependencies.part.aa icq-dependencies.part.ab icq-dependencies.part.ac icq-dependencies.part.ad icq-dependencies.part.ae
          
          # Собираем архив
          echo ""
          echo "📦 Сборка архива..."
          cat icq-dependencies.part.aa icq-dependencies.part.ab icq-dependencies.part.ac icq-dependencies.part.ad icq-dependencies.part.ae > qt5-core.zip
          
          echo ""
          echo "✅ Архив собран:"
          ls -lh qt5-core.zip

      - name: Commit and remove parts
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Добавляем архив
          git add qt5-core.zip
          
          # Удаляем использованные части
          git rm icq-dependencies.part.aa icq-dependencies.part.ab icq-dependencies.part.ac icq-dependencies.part.ad icq-dependencies.part.ae
          
          git commit -m "Assemble qt5-core.zip from parts aa-ae"
          git push
