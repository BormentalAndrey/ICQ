      - name: Find libcurl for Android
        run: |
          # Устанавливаем заголовки
          sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
          
          # Находим, где лежит curl.h (обычно /usr/include/x86_64-linux-gnu/curl или /usr/include/curl)
          CURL_H_PATH=$(find /usr/include -name "curl.h" | head -n 1)
          CURL_DIR=$(dirname "$CURL_H_PATH")
          
          echo "CURL_INCLUDE_PATH=$CURL_DIR" >> $GITHUB_ENV
          echo "Найден путь инклудов Curl: $CURL_DIR"
          
          # ХАК ДЛЯ ЯДРА ICQ: Код хочет #include <curl.h>, а в системе он лежит в curl/curl.h
          # Создаем временную папку и копируем туда содержимое, чтобы curl.h лежал в корне инклуда
          mkdir -p ${{ github.workspace }}/external_curl_fix
          cp -r $CURL_DIR/* ${{ github.workspace }}/external_curl_fix/
          echo "CURL_INCLUDE_PATH=${{ github.workspace }}/external_curl_fix" >> $GITHUB_ENV

      - name: Build ICQ Mobile
        run: |
          chmod +x gradlew
          # Передаем переменную в CMake через аргументы Gradle
          ./gradlew :app:assembleDebug -Pandroid.externalNativeBuildFlags="-DCURL_INCLUDE_PATH=${{ env.CURL_INCLUDE_PATH }}" --stacktrace
        env:
          BOOST_ROOT: ${{ github.workspace }}/boost_1_83_0
          RAPIDJSON_ROOT: ${{ github.workspace }}/rapidjson/include
