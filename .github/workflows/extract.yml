# .github/workflows/debug-build.yml
name: Debug Build ICQ Mobile

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  debug-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"
      
      - name: Full diagnostics - find all gradle files
        run: |
          echo "========================================="
          echo "STEP 1: Finding all .gradle files"
          echo "========================================="
          find . -name "*.gradle*" -type f | sort -f
          
          echo "\n========================================="
          echo "STEP 2: Finding repositories in all files"
          echo "========================================="
          find . -name "*.gradle*" -type f -exec grep -l "repositories" {} \;
          
          echo "\n========================================="
          echo "STEP 3: Finding google() in all files"
          echo "========================================="
          find . -name "*.gradle*" -type f -exec grep -l "google()" {} \;
          
          echo "\n========================================="
          echo "STEP 4: Finding mavenCentral() in all files"
          echo "========================================="
          find . -name "*.gradle*" -type f -exec grep -l "mavenCentral()" {} \;
          
          echo "\n========================================="
          echo "STEP 5: Finding buildscript blocks"
          echo "========================================="
          find . -name "*.gradle*" -type f -exec grep -l "buildscript" {} \;
          
          echo "\n========================================="
          echo "STEP 6: Finding allprojects blocks"
          echo "========================================="
          find . -name "*.gradle*" -type f -exec grep -l "allprojects" {} \;
          
          echo "\n========================================="
          echo "STEP 7: Finding subprojects blocks"
          echo "========================================="
          find . -name "*.gradle*" -type f -exec grep -l "subprojects" {} \;
      
      - name: Show content of settings.gradle.kts
        run: |
          echo "========================================="
          echo "settings.gradle.kts content:"
          echo "========================================="
          cat settings.gradle.kts
      
      - name: Show content of build.gradle.kts
        run: |
          echo "========================================="
          echo "build.gradle.kts content:"
          echo "========================================="
          cat build.gradle.kts
      
      - name: Show content of gradle.properties
        run: |
          echo "========================================="
          echo "gradle.properties content:"
          echo "========================================="
          cat gradle.properties
      
      - name: Show content of gradle wrapper properties
        run: |
          echo "========================================="
          echo "gradle-wrapper.properties content:"
          echo "========================================="
          cat gradle/wrapper/gradle-wrapper.properties
      
      - name: Show all module build.gradle.kts files
        run: |
          echo "========================================="
          echo "All module build.gradle.kts files:"
          echo "========================================="
          find . -path "*/build.gradle.kts" -not -path "./build.gradle.kts" | while read file; do
            echo "\n--- $file ---"
            head -20 "$file"
          done
      
      - name: Check for any build.gradle files (without .kts)
        run: |
          echo "========================================="
          echo "Checking for build.gradle (without .kts):"
          echo "========================================="
          find . -name "build.gradle" -not -name "*.kts"
      
      - name: Check for init scripts
        run: |
          echo "========================================="
          echo "Checking for init scripts:"
          echo "========================================="
          find . -name "init.gradle*"
          ls -la ~/.gradle/init.d/ 2>/dev/null || echo "No init.d folder"
      
      - name: Clear Gradle cache
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf .gradle
          rm -rf */build
      
      - name: Create fresh gradle wrapper
        run: |
          rm -rf gradle/wrapper
          mkdir -p gradle/wrapper
          
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          
          chmod +x gradlew
      
      - name: Create minimal settings.gradle.kts
        run: |
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.name = "ICQ"
          include(":app")
          EOF
      
      - name: Create minimal build.gradle.kts
        run: |
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.6.0" apply false
          }
          EOF
      
      - name: Try minimal build
        run: |
          ./gradlew projects --stacktrace
      
      - name: Now try full build with FAIL_ON_PROJECT_REPOS
        run: |
          ./gradlew :app:assembleDebug --stacktrace
