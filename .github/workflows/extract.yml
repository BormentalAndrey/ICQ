name: Auto-fix Compilation Errors (PR Mode)

on:
  workflow_dispatch:

jobs:
  fix-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Create unique fix branch
        run: |
          BRANCH_NAME="fix/build-errors-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          
      - name: 🛠 Deep Fix config.cpp (std::pair to {})
        run: |
          FILE="common.shared/config/config.cpp"
          if [ -f "$FILE" ]; then
            # 1. Заменяем "std::pair(" на " { "
            sed -i 's/std::pair(/ { /g' "$FILE"
            # 2. Заменяем закрывающие "))" на " }" в конце строк с параметрами
            sed -i '/features::/s/)),/ },/g' "$FILE"
            # 3. На случай если это последняя строка в блоке (без запятой)
            sed -i '/features::/s/))/ }/g' "$FILE"
            echo "✓ config.cpp patched"
          fi
          
      - name: 🛠 Fix binary_stream.h (Sign-compare)
        run: |
          FILE="core/tools/binary_stream.h"
          if [ -f "$FILE" ]; then
            sed -i 's/size_need > buffer_.size()/static_cast<size_t>(size_need) > buffer_.size()/g' "$FILE"
            sed -i 's/all_size() > 2/static_cast<size_t>(all_size()) > 2/g' "$FILE"
            sed -i 's/all_size() > 4/static_cast<size_t>(all_size()) > 4/g' "$FILE"
            echo "✓ binary_stream.h patched"
          fi
          
      - name: 🛠 Fix common.h (MEGABYTE casting)
        run: |
          FILE="common.shared/common.h"
          if [ -f "$FILE" ]; then
            sed -i 's/100 \* MEGABYTE/100LL * static_cast<long long>(MEGABYTE)/g' "$FILE"
            sed -i 's/500 \* MEGABYTE/500LL * static_cast<long long>(MEGABYTE)/g' "$FILE"
            sed -i 's/1500LL \* MEGABYTE/1500LL * static_cast<long long>(MEGABYTE)/g' "$FILE"
            echo "✓ common.h patched"
          fi

      - name: Commit and Push
        id: push
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "SKIPPED=true" >> $GITHUB_OUTPUT
          else
            git commit -m "build: fix std::pair and sign-compare issues"
            git push origin ${{ env.BRANCH_NAME }}
            echo "SKIPPED=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Create Pull Request
        if: steps.push.outputs.SKIPPED == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔧 Фикс ошибок компиляции (std::pair -> {})',
              body: 'Автоматическое исправление структуры инициализации в config.cpp и приведение типов в заголовках.',
              head: process.env.BRANCH_NAME,
              base: 'main'
            });
