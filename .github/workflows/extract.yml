# .github/workflows/cleanup.yml
name: Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Delete old files
        run: |
          rm -f icq-dependencies.part.*
          rm -f icq-dependencies.zip
          ls -la

      - name: Push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Delete old parts" || echo "No changes"
          git push
