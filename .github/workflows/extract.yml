name: Android CI Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Создание директории для логов
        run: |
          mkdir -p logs
          mkdir -p build/reports

      - name: Установка Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Установка Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Каждый пакет на новой строке
          packages: |
            platform-tools
            platforms;android-33
            platforms;android-34
            build-tools;34.0.0
          ndk-version: "26.1.10909125"

      - name: Кэширование Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/.cxx
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Проверка зависимостей
        run: |
          echo "=== Проверка Qt ===" | tee -a logs/check.log
          if [ -d "Qt/android_arm64_v8a" ]; then
            echo "✅ Qt найден" | tee -a logs/check.log
          else
            echo "⚠️ Qt не найден" | tee -a logs/check.log
          fi
          
          echo "=== Проверка OpenSSL ===" | tee -a logs/check.log
          if [ -d "Openssl-android-arm64/arm64-v8a" ]; then
            echo "✅ OpenSSL найден" | tee -a logs/check.log
          else
            echo "⚠️ OpenSSL не найден" | tee -a logs/check.log
          fi

      - name: Разрешение на выполнение gradlew
        run: chmod +x gradlew

      - name: Проверка Gradle
        run: ./gradlew --version >> logs/gradle.log 2>&1

      - name: Очистка
        run: ./gradlew clean --stacktrace >> logs/clean.log 2>&1 || true

      - name: Сборка проекта
        id: build
        run: |
          echo "=== Сборка $(date) ===" | tee logs/build.log
          ./gradlew assembleRelease --stacktrace --info >> logs/build.log 2>&1
          BUILD_EXIT_CODE=$?
          echo "Код: $BUILD_EXIT_CODE" >> logs/build.log
          echo "BUILD_EXIT_CODE=$BUILD_EXIT_CODE" >> $GITHUB_ENV
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ Ошибка!" | tee -a logs/build.log
            tail -50 logs/build.log | tee -a logs/error_summary.txt
            exit $BUILD_EXIT_CODE
          fi
        continue-on-error: true

      - name: Тесты
        if: always()
        run: |
          echo "=== Тесты ===" | tee logs/tests.log
          chmod +x gradlew
          ./gradlew test --stacktrace >> logs/tests.log 2>&1 || echo "⚠️ Тесты не выполнены" | tee -a logs/tests.log

      - name: Сохранение ВСЕХ логов и артефактов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-${{ github.run_number }}
          path: |
            logs/
            **/build/reports/
            **/build/test-results/
            **/.cxx/**/*.log
            app/build/outputs/apk/
          retention-days: 7

      - name: Вывод ошибки в консоль (если есть)
        if: failure()
        run: |
          echo "========================================="
          echo "❌ СБОРКА ПРОВАЛИЛАСЬ ❌"
          echo "========================================="
          echo "Код ошибки: $BUILD_EXIT_CODE"
          echo "Полные логи в артефакте: ci-artifacts-${{ github.run_number }}"
          echo "========================================="
          if [ -f logs/error_summary.txt ]; then
            echo "Краткое описание ошибки:"
            cat logs/error_summary.txt
          fi
