name: Build ICQ Mobile

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            cmake \
            ninja-build \
            build-essential

      - name: Fix Environment and Case Sensitivity
        run: |
          # Создаем симлинк для voip3.h
          mkdir -p core/voip
          if [ -d "core/Voip" ]; then
            if [ ! -f "core/voip/voip3.h" ]; then
              echo '#include "../Voip/VoipManager.h"' > core/voip/voip3.h
            fi
          fi
          
          # Создаем недостающие заглушки
          mkdir -p common.shared/config
          cat > common.shared/config/config_data.h << 'EOF'
          #pragma once
          #include <string>
          namespace config {
              std::string config_json();
          }
          EOF
          
          cat > common.shared/loader_errors.h << 'EOF'
          #pragma once
          namespace core { namespace loader {
              enum class error_code { ok, network_error, file_error };
          }}
          EOF

      - name: Fix includes in proxy_settings.h
        run: |
          if [ -f "core/proxy_settings.h" ]; then
            if ! grep -q "tools/binary_stream.h" "core/proxy_settings.h"; then
              sed -i '1i#include "tools/binary_stream.h"\n#include "tools/tlv.h"' core/proxy_settings.h
              echo "✅ Added includes to proxy_settings.h"
            else
              echo "✅ Includes already present in proxy_settings.h"
            fi
          else
            echo "⚠️ proxy_settings.h not found"
          fi

      - name: Fix includes in im_stats.h
        run: |
          if [ -f "core/stats/im/im_stats.h" ]; then
            if ! grep -q "rapidjson/document.h" "core/stats/im/im_stats.h"; then
              sed -i '1i#include <rapidjson/document.h>\n#include <rapidjson/writer.h>\n#include <rapidjson/stringbuffer.h>\n#include "tools/binary_stream.h"\n#include "tools/tlv.h"' core/stats/im/im_stats.h
              echo "✅ Added includes to im_stats.h"
            else
              echo "✅ Includes already present in im_stats.h"
            fi
          else
            echo "⚠️ im_stats.h not found"
          fi

      - name: Fix voip includes
        run: |
          if [ -f "core/Voip/libvoip/src/CallStateInternal.h" ]; then
            if ! grep -q "#include <voip/voip3.h>" "core/Voip/libvoip/src/CallStateInternal.h"; then
              sed -i '1i#include <voip/voip3.h>' core/Voip/libvoip/src/CallStateInternal.h
              echo "✅ Added voip3.h to CallStateInternal.h"
            fi
          fi
          
          if [ -f "core/Voip/libvoip/include/sigconv/SignallingConverter.h" ]; then
            if ! grep -q "#include <voip/voip3.h>" "core/Voip/libvoip/include/sigconv/SignallingConverter.h"; then
              sed -i '1i#include <voip/voip3.h>' core/Voip/libvoip/include/sigconv/SignallingConverter.h
              echo "✅ Added voip3.h to SignallingConverter.h"
            fi
          fi

      - name: Setup libcurl for Android
        run: |
          # Находим curl.h
          CURL_H_PATH=$(find /usr/include -name "curl.h" | head -n 1)
          CURL_DIR=$(dirname "$CURL_H_PATH")
          
          echo "Found curl.h at: $CURL_H_PATH"
          echo "Curl directory: $CURL_DIR"
          
          # Создаем плоскую структуру для #include <curl.h>
          mkdir -p ${{ github.workspace }}/curl_flat
          cp -r $CURL_DIR/* ${{ github.workspace }}/curl_flat/
          
          echo "CURL_INCLUDE_PATH=${{ github.workspace }}/curl_flat" >> $GITHUB_ENV
          echo "✅ Created flat curl include structure at: ${{ github.workspace }}/curl_flat"

      - name: Cache Boost
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost_1_83_0
          key: ${{ runner.os }}-boost-1.83.0

      - name: Download Boost 1.83.0
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          wget -q https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.bz2
          tar -xjf boost_1_83_0.tar.bz2

      - name: Download RapidJSON
        run: |
          git clone --depth 1 https://github.com/Tencent/rapidjson.git ${{ github.workspace }}/rapidjson

      - name: Fix CMakeLists.txt
        run: |
          cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.22.1)
          project("icq_mobile_core")

          set(ICQ_ROOT "${CMAKE_CURRENT_SOURCE_DIR}/../../../../")

          add_compile_definitions(
              LINUX
              __linux__
              ANDROID
              STRIP_CRASH_HANDLER
              SUPPORT_EXTERNAL_CONFIG
              HAVE_SECURE_GETENV=1
              _FORTIFY_SOURCE=2
          )

          file(GLOB_RECURSE CORE_SOURCES
              "${ICQ_ROOT}/core/*.cpp"
              "${ICQ_ROOT}/common.shared/*.cpp"
              "${ICQ_ROOT}/corelib/*.cpp"
              "${ICQ_ROOT}/gui.shared/*.cpp"
          )

          list(FILTER CORE_SOURCES EXCLUDE REGEX 
              ".*win32.*|.*macos.*|.*apple.*|.*linux_desktop.*|.*test.*|.*stdafx\\.cpp|.*unittests.*|.*_mac\\.cpp|.*_ios\\.cpp|.*/gui/.*|.*/internal/.*"
          )

          add_library(icq_core SHARED
              jni_bridge.cpp
              ${CORE_SOURCES}
          )

          target_include_directories(icq_core PRIVATE
              ${CMAKE_CURRENT_SOURCE_DIR}
              ${ICQ_ROOT}                                
              ${ICQ_ROOT}/core                           
              ${ICQ_ROOT}/core/Voip/libvoip/include
              ${ICQ_ROOT}/core/Voip/libvoip/src
              ${ICQ_ROOT}/corelib
              ${ICQ_ROOT}/common.shared
              ${ICQ_ROOT}/gui.shared
              ${ICQ_ROOT}/boost_1_83_0
              ${ICQ_ROOT}/rapidjson/include
              $ENV{CURL_INCLUDE_PATH}
          )

          set_target_properties(icq_core PROPERTIES
              CXX_STANDARD 17
              CXX_STANDARD_REQUIRED ON
              POSITION_INDEPENDENT_CODE ON
              CXX_VISIBILITY_PRESET hidden
              VISIBILITY_INLINES_HIDDEN ON
          )

          target_compile_options(icq_core PRIVATE 
              -fexceptions -frtti -fPIC -Wall 
              -Wno-unused-parameter -Wno-unused-variable
              -fdata-sections -ffunction-sections
          )

          find_library(log-lib log)
          find_library(z-lib z)
          find_library(android-lib android)

          target_link_libraries(icq_core
              ${log-lib}
              ${z-lib}
              ${android-lib}
              -Wl,--gc-sections
          )

          message(STATUS "Build Configuration:")
          message(STATUS "  ICQ_ROOT: ${ICQ_ROOT}")
          message(STATUS "  CURL_INC: $ENV{CURL_INCLUDE_PATH}")
          EOF
          
          echo "✅ Updated CMakeLists.txt"

      - name: Fix jni_bridge.cpp
        run: |
          cat > app/src/main/cpp/jni_bridge.cpp << 'EOF'
          #include <jni.h>
          #include <string>
          #include <memory>
          #include <mutex>
          #include <thread>
          #include <vector>
          #include <codecvt>
          #include <locale>
          #include <android/log.h>

          #include "core/stdafx.h"
          #include "core/core_dispatcher.h"
          #include "core/icore_interface.h"

          #define LOG_TAG "IcqCoreJNI"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)

          JavaVM* g_jvm = nullptr;
          static std::unique_ptr<core::core_dispatcher> g_core;
          static jobject g_event_callback_obj = nullptr;
          static std::shared_ptr<core::icore_interface> g_gui_callback;
          static std::mutex g_core_mutex;

          class AndroidGuiCallback : public core::icore_interface {
          public:
              void receive_variable(const std::string& _name, core::coll_ptr _value) override {
                  notify_java_event(_name);
              }

              void receive_package(const std::string& _name, core::coll_ptr _value) override {
                  notify_java_event(_name);
              }

              void on_voip_proto_msg(const std::string& _account, const std::vector<char>& _data) override {
                  notify_java_event("voip_proto_msg");
              }

              void send_statistic_event(const std::string& _event, const core::event_props_type& _props) override {
                  LOGI("Core Statistic Event: %s", _event.c_str());
              }

              std::string get_device_id() override {
                  return "android_id";
              }

          private:
              void notify_java_event(const std::string& _event_name) {
                  if (!g_jvm || !g_event_callback_obj) return;

                  JNIEnv* env = nullptr;
                  bool attached = false;
                  jint res = g_jvm->GetEnv(reinterpret_cast<void**>(&env), JNI_VERSION_1_6);
                  
                  if (res == JNI_EDETACHED) {
                      if (g_jvm->AttachCurrentThread(&env, nullptr) != JNI_OK) {
                          LOGE("Failed to attach thread to JVM");
                          return;
                      }
                      attached = true;
                  }

                  jclass callbackClass = env->GetObjectClass(g_event_callback_obj);
                  jmethodID methodId = env->GetMethodID(callbackClass, "onCoreEvent", "(Ljava/lang/String;)V");
                  
                  if (methodId) {
                      jstring jName = env->NewStringUTF(_event_name.c_str());
                      env->CallVoidMethod(g_event_callback_obj, methodId, jName);
                      env->DeleteLocalRef(jName);
                  }
                  
                  env->DeleteLocalRef(callbackClass);
                  if (attached) {
                      g_jvm->DetachCurrentThread();
                  }
              }
          };

          JNIEXPORT jint JNICALL JNI_OnLoad(JavaVM* vm, void* reserved) {
              g_jvm = vm;
              return JNI_VERSION_1_6;
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_icq_mobile_core_IcqCoreEngine_nativeInit(JNIEnv *env, jobject thiz, jstring data_path, jstring cache_path, jobject callback) {
              std::lock_guard<std::mutex> lock(g_core_mutex);
              
              if (g_core) {
                  LOGI("Core Engine is already initialized.");
                  return;
              }

              if (g_event_callback_obj) {
                  env->DeleteGlobalRef(g_event_callback_obj);
              }
              g_event_callback_obj = env->NewGlobalRef(callback);
              
              auto callback_impl = std::make_shared<AndroidGuiCallback>();
              g_gui_callback = std::static_pointer_cast<core::icore_interface>(callback_impl);

              const char *data_path_cstr = env->GetStringUTFChars(data_path, nullptr);
              std::string path_str(data_path_cstr);
              env->ReleaseStringUTFChars(data_path, data_path_cstr);

              common::core_gui_settings settings;
              settings.os_version_ = "Android";
              settings.locale_ = "ru_RU";
              
              try {
                  std::wstring_convert<std::codecvt_utf8<wchar_t>> converter;
                  settings.profile_path_ = converter.from_bytes(path_str);
              } catch (...) {
                  settings.profile_path_ = std::wstring(path_str.begin(), path_str.end());
              }
              
              g_core = std::make_unique<core::core_dispatcher>();
              g_core->link_gui(g_gui_callback, settings);
              
              LOGI("Core Engine initialized. Path: %s", path_str.c_str());
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_icq_mobile_core_IcqCoreEngine_nativeShutdown(JNIEnv *env, jobject thiz) {
              std::lock_guard<std::mutex> lock(g_core_mutex);
              
              if (g_core) {
                  g_core->unlink_gui();
                  g_core.reset();
                  LOGI("Core Engine unlinked and reset.");
              }
              
              if (g_event_callback_obj) {
                  env->DeleteGlobalRef(g_event_callback_obj);
                  g_event_callback_obj = nullptr;
              }
              
              g_gui_callback.reset();
              LOGI("Core Engine shutdown complete.");
          }
          EOF
          
          echo "✅ Updated jni_bridge.cpp"

      - name: Fix VoipManagerDefines.h
        run: |
          cat > core/Voip/VoipManagerDefines.h << 'EOF'
          #pragma once
          #include <string>
          #include <vector>
          #include <memory>

          #define PREVIEW_RENDER_NAME "@camera_stream_id"
          #define DEFAULT_DEVICE_UID "default_device"

          namespace voip
          {
              using CallId = std::string;
              using PeerId = std::string;

              enum MediaSenderState {
                  MSS_None = 0,
                  MSS_Starting,
                  MSS_Started,
                  MSS_Stopping,
                  MSS_Stopped,
                  MSS_Error
              };

              enum DeviceType { AudioRecording = 0, AudioPlayback, VideoCapturing };
              enum VideoCaptureType { VC_DeviceCamera, VC_DeviceVirtualCamera, VC_DeviceDesktop };

              enum TerminateReason {
                  TR_HANGUP = 0, TR_REJECT, TR_BUSY, TR_HANDLED_BY_ANOTHER_INSTANCE,
                  TR_UNAUTHORIZED, TR_ALLOCATE_FAILED, TR_ANSWER_TIMEOUT, TR_CONNECT_TIMEOUT,
                  TR_NOT_FOUND, TR_BLOCKED_BY_CALLER_IS_STRANGER, TR_BLOCKED_BY_CALLEE_PRIVACY,
                  TR_CALLER_MUST_BE_AUTHORIZED_BY_CAPCHA, TR_BAD_URI, TR_NOT_AVAILABLE_NOW,
                  TR_PARTICIPANTS_LIMIT_EXCEEDED, TR_DURATION_LIMIT_EXCEEDED, TR_INTERNAL_ERROR
              };
          }

          namespace voip_manager
          {
              using namespace voip;

              struct Contact {
                  voip::CallId call_id;
                  std::string contact;
                  bool remote_cam_enabled = false;
                  bool remote_mic_enabled = false;
                  bool connected_state = false;
                  Contact() {}
                  Contact(const voip::CallId& call_id_, const std::string& contact_) : call_id(call_id_), contact(contact_) {}
                  bool operator==(const Contact& other) const { return other.call_id == call_id && other.contact == contact; }
              };

              struct ContactEx {
                  Contact contact;
                  std::string call_type;
                  std::string chat_id;
                  bool current_call = false;
                  bool incoming = false;
                  int terminate_reason = 0;
                  std::vector<void*> windows;
              };

              struct device_description {
                  std::string uid;
                  std::string name;
                  DeviceType type = VideoCapturing;
                  VideoCaptureType videoCaptureType = VC_DeviceCamera;
                  bool is_default = false;
              };

              struct WindowParams {
                  void* hwnd;
                  voip::CallId call_id;
                  bool isPrimary = false;
                  bool isIncoming = false;
                  float scale = 1.0f;
                  WindowParams() : hwnd(nullptr), isPrimary(false), isIncoming(false), scale(1.0f) {}
              };

              struct VoipProtoMsg {
                  std::string account_uid;
                  int msg_type = 0;
                  std::vector<char> data;
                  VoipProtoMsg() : msg_type(0) {}
              };

              class VoipManager {
              public:
                  virtual ~VoipManager() = default;
                  virtual void call_create(const std::vector<std::string>& contacts, std::string& account, bool video) = 0;
                  virtual void call_stop() = 0;
                  virtual void call_accept(const voip::CallId& call_id, const std::string& account, bool video) = 0;
                  virtual void call_decline(const Contact& contact, bool busy, bool conference) = 0;
                  virtual void call_terminate(const voip::CallId& call_id, TerminateReason reason) = 0;
                  virtual void get_device_list(DeviceType type, std::vector<device_description>& dev_list) = 0;
                  virtual void set_device(DeviceType type, const std::string& guid, bool force_reset) = 0;
                  virtual void set_device_mute(DeviceType type, bool mute) = 0;
                  virtual bool get_device_mute(DeviceType type) = 0;
                  virtual void set_device_vol(DeviceType type, float vol) = 0;
                  virtual float get_device_vol(DeviceType type) = 0;
                  virtual void window_add(WindowParams& params) = 0;
                  virtual void window_remove(void* hwnd) = 0;
                  virtual void media_video_en(bool enable) = 0;
                  virtual void media_audio_en(bool enable) = 0;
                  virtual bool is_video_en() = 0;
                  virtual bool is_audio_en() = 0;
                  virtual void ProcessVoipMsg(const std::string& account, int msg, const char* data, unsigned len) = 0;
                  virtual void ProcessVoipAck(const VoipProtoMsg& msg, bool success) = 0;
                  virtual void reset() = 0;
                  virtual void update() = 0;
              };
          }
          EOF
          
          echo "✅ Updated VoipManagerDefines.h"

      - name: Fix permissions and build
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee build.log
        env:
          BOOST_ROOT: ${{ github.workspace }}/boost_1_83_0
          RAPIDJSON_ROOT: ${{ github.workspace }}/rapidjson/include
          CURL_INCLUDE_PATH: ${{ env.CURL_INCLUDE_PATH }}

      - name: Save build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/reports/
            app/.cxx/**/*.log
            .gradle/daemon/**/daemon-*.log
            build.log
