name: Build ICQ Mobile

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'
          cmdline-tools-version: 'latest'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            cmake \
            ninja-build \
            build-essential \
            libgl1-mesa-dev \
            libxcb-xinerama0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            python3-pip

      # ==================== ПРОДАКШН БЛОК Qt (с кэшем) ====================
      - name: Install & Cache Qt 6.5.0 desktop (tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          dir: '${{ github.workspace }}/Qt'
          cache: 'true'
          cache-key-prefix: 'qt-6.5-icq'

      - name: Install & Cache Qt 6.5.0 Android arm64_v8a
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          dir: '${{ github.workspace }}/Qt'
          cache: 'true'
          cache-key-prefix: 'qt-6.5-icq'

      - name: Verify Qt installation
        run: |
          echo "=== Qt Desktop ==="
          if [ -f "${{ github.workspace }}/Qt/6.5.0/gcc_64/lib/cmake/Qt6/Qt6Config.cmake" ]; then
            echo "✅ Desktop Qt OK"
          else
            echo "❌ Desktop Qt missing"
            exit 1
          fi
          
          echo "=== Qt Android ==="
          if [ -f "${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a/lib/cmake/Qt6/Qt6Config.cmake" ]; then
            echo "✅ Android Qt OK"
          else
            echo "❌ Android Qt missing"
            exit 1
          fi
          
          echo "Qt structure ready for CMake"

      - name: Set Qt environment variables
        run: |
          echo "QT_ANDROID_PATH=${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a" >> $GITHUB_ENV
          echo "QT_HOST_PATH=${{ github.workspace }}/Qt/6.5.0/gcc_64" >> $GITHUB_ENV
          echo "Qt6_DIR=${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a/lib/cmake/Qt6" >> $GITHUB_ENV
          echo "Qt6_ANDROID_DIR=${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a/lib/cmake:${{ github.workspace }}/Qt/6.5.0/gcc_64/lib/cmake" >> $GITHUB_ENV
          chmod +x gradlew
          echo "✅ Qt environment configured for production"

      # ==================== ОСТАВШИЕСЯ ШАГИ ====================
      - name: Setup Boost
        run: |
          if [ ! -d "boost_1_83_0" ]; then
            echo "📦 Downloading Boost 1.83.0..."
            wget -q https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.bz2
            tar -xjf boost_1_83_0.tar.bz2
            rm boost_1_83_0.tar.bz2
          fi
          echo "BOOST_ROOT=${{ github.workspace }}/boost_1_83_0" >> $GITHUB_ENV
          echo "✅ Boost ready"

      - name: Setup RapidJSON
        run: |
          if [ ! -d "rapidjson" ]; then
            echo "📦 Cloning RapidJSON..."
            git clone --depth 1 https://github.com/Tencent/rapidjson.git
          fi
          echo "RAPIDJSON_ROOT=${{ github.workspace }}/rapidjson/include" >> $GITHUB_ENV
          echo "✅ RapidJSON ready"

      - name: Setup libcurl for Android
        run: |
          CURL_H_PATH=$(find /usr/include -name "curl.h" | head -n 1)
          if [ -n "$CURL_H_PATH" ]; then
            CURL_DIR=$(dirname "$CURL_H_PATH")
            mkdir -p ${{ github.workspace }}/curl_flat
            cp -r $CURL_DIR/* ${{ github.workspace }}/curl_flat/
            echo "CURL_INCLUDE_PATH=${{ github.workspace }}/curl_flat" >> $GITHUB_ENV
            echo "✅ Curl include configured"
          else
            echo "⚠️ curl.h not found, using system path"
          fi

      - name: Build
        run: |
          ./gradlew :app:assembleDebug \
            -Pqt.android.path="${{ env.QT_ANDROID_PATH }}" \
            -Pqt.host.path="${{ env.QT_HOST_PATH }}" \
            -Pboost.root="${{ github.workspace }}/boost_1_83_0" \
            -Prapidjson.root="${{ github.workspace }}/rapidjson/include" \
            --stacktrace 2>&1 | tee build.log
        env:
          CURL_INCLUDE_PATH: ${{ github.workspace }}/curl_flat
          BOOST_ROOT: ${{ github.workspace }}/boost_1_83_0
          RAPIDJSON_ROOT: ${{ github.workspace }}/rapidjson/include

      - name: Save build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            app/.cxx/**/*.log
            app/build/reports/
          retention-days: 7
