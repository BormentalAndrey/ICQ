# .github/workflows/assemble-qt-bundle.yml
name: Assemble Qt5 Bundle from Parts

on:
  push:
    branches: [ main, master ]
    paths:
      - 'qt5-bundle.part.*'
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble Qt5 bundle from parts
        run: |
          echo "========================================="
          echo "СБОРКА Qt5 БАНДЛА ИЗ ЧАСТЕЙ"
          echo "========================================="
          
          # Находим все части архива
          echo ""
          echo "📁 Найденные части:"
          ls -la qt5-bundle.part.*
          
          # Собираем архив из частей
          echo ""
          echo "🔧 Собираем архив..."
          cat qt5-bundle.part.* > qt5-bundle.tar.gz
          
          # Проверяем
          echo ""
          echo "✅ Архив собран!"
          ls -lh qt5-bundle.tar.gz
          
          # Проверяем целостность
          echo ""
          echo "🔍 Проверяем архив..."
          if tar -tzf qt5-bundle.tar.gz > /dev/null 2>&1; then
            echo "   ✅ Архив корректный"
            echo "   📄 Файлов: $(tar -tzf qt5-bundle.tar.gz | wc -l)"
          else
            echo "   ❌ Архив поврежден!"
            exit 1
          fi

      - name: Extract Qt5 bundle
        run: |
          echo ""
          echo "📦 Распаковываем Qt5..."
          mkdir -p qt5-bundle
          tar -xzf qt5-bundle.tar.gz -C qt5-bundle/
          
          echo "✅ Распаковано:"
          ls -la qt5-bundle/ | head -10
          
          echo ""
          echo "📊 Размер:"
          du -sh qt5-bundle/

      - name: Set up Qt environment
        run: |
          QT_DIR="${{ github.workspace }}/qt5-bundle"
          echo "Qt5_DIR=${QT_DIR}/cmake/Qt5" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=${QT_DIR}/cmake" >> $GITHUB_ENV
          echo "PATH=${QT_DIR}/bin:$PATH" >> $GITHUB_ENV
          
          echo "✅ Qt environment configured"
          echo "   Qt5_DIR: ${QT_DIR}/cmake/Qt5"

      - name: Verify Qt installation
        run: |
          echo ""
          echo "🔍 Проверка Qt5:"
          
          # Проверяем qmake
          if [ -f "qt5-bundle/bin/qmake" ]; then
            chmod +x qt5-bundle/bin/qmake
            qt5-bundle/bin/qmake --version
            echo "   ✅ qmake работает"
          else
            echo "   ❌ qmake не найден"
          fi
          
          # Проверяем библиотеки
          echo ""
          echo "📚 Qt библиотеки:"
          ls -la qt5-bundle/lib/libQt5*.so | head -10
          
          # Проверяем заголовки
          echo ""
          echo "📁 Qt заголовки:"
          ls -la qt5-bundle/include/

      - name: Upload assembled bundle
        uses: actions/upload-artifact@v4
        with:
          name: qt5-bundle-assembled
          path: qt5-bundle.tar.gz
          retention-days: 7

      - name: Clean up parts (optional)
        if: github.event_name == 'push'
        run: |
          echo ""
          echo "🧹 Очистка частей архива..."
          rm -f qt5-bundle.part.*
          echo "✅ Части удалены"

      - name: Commit cleaned repository
        if: github.event_name == 'push'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "🧹 Clean up Qt5 bundle parts after assembly"
            git push
            echo "✅ Очистка закоммичена"
          else
            echo "ℹ️ Нет изменений для коммита"
          fi
