# .github/workflows/extract-zip-archives.yml
name: Extract ZIP Archives

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.zip'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract ZIP files
        run: |
          echo "========================================="
          echo "РАСПАКОВКА ZIP АРХИВОВ"
          echo "========================================="
          
          # Находим все zip файлы
          for archive in $(find . -name "*.zip" -type f); do
            echo ""
            echo "📦 Распаковка: $archive"
            echo "   Размер: $(du -h "$archive" | cut -f1)"
            
            # Получаем директорию
            dir=$(dirname "$archive")
            cd "$dir"
            
            # Распаковываем
            unzip -q -o "$(basename "$archive")"
            
            # Проверяем результат
            if [ $? -eq 0 ]; then
              echo "   ✅ Успешно"
              # Удаляем архив
              rm -f "$(basename "$archive")"
            else
              echo "   ❌ Ошибка распаковки"
            fi
            
            cd - > /dev/null
          done

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add -A
          git commit -m "Extract ZIP archives" || echo "Нет изменений"
          git push
