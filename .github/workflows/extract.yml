name: Build ICQ Mobile with Qt

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'
          cmdline-tools-version: 'latest'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            cmake \
            ninja-build \
            build-essential \
            libgl1-mesa-dev \
            libxcb-xinerama0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            python3-pip

      - name: Cache Qt
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/Qt
          key: ${{ runner.os }}-qt-6.5.0-android-${{ hashFiles('.qt-version') }}
          restore-keys: |
            ${{ runner.os }}-qt-6.5.0-android-

      - name: Install aqtinstall (Qt Downloader)
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: pip install aqtinstall

      - name: Install Qt 6.5.0 for Android & Linux
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          echo "📦 Installing Qt desktop version (required for android tools)..."
          aqt install-qt linux desktop 6.5.0 gcc_64 --outputdir ${{ github.workspace }}/Qt
          
          echo "📦 Installing Qt android version..."
          aqt install-qt linux android 6.5.0 android_arm64_v8a --outputdir ${{ github.workspace }}/Qt
          
          echo "6.5.0-android" > .qt-version
          echo "✅ Qt installation complete"

      - name: Set Qt environment
        run: |
          echo "Qt6_DIR=${{ github.workspace }}/Qt/6.5.0/gcc_64" >> $GITHUB_ENV
          echo "Qt6_ANDROID_DIR=${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=${{ github.workspace }}/Qt/6.5.0/gcc_64/lib/cmake:${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a/lib/cmake" >> $GITHUB_ENV
          echo "✅ Qt environment configured"

      - name: Verify Qt installation
        run: |
          echo "=== Verifying Qt installation ==="
          echo "Qt Android path: ${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a"
          echo "Qt Host path: ${{ github.workspace }}/Qt/6.5.0/gcc_64"
          
          if [ -d "${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a" ]; then
            echo "✅ Qt Android directory exists"
            ls -la ${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a/lib/cmake/Qt6/ || echo "Qt6 cmake dir not found"
          else
            echo "❌ Qt Android directory not found"
          fi
          
          if [ -f "${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a/lib/cmake/Qt6Core/Qt6CoreConfig.cmake" ]; then
            echo "✅ Qt6Core config found"
          else
            echo "⚠️ Qt6Core config not found, checking available modules..."
            find ${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a/lib/cmake -maxdepth 1 -type d 2>/dev/null || echo "No modules found"
          fi

      - name: Cache Boost
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost_1_83_0
          key: ${{ runner.os }}-boost-1.83.0
          restore-keys: |
            ${{ runner.os }}-boost-1.83.0-

      - name: Setup Boost 1.83.0
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          echo "📦 Downloading Boost 1.83.0..."
          wget -q https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.bz2
          tar -xjf boost_1_83_0.tar.bz2
          rm boost_1_83_0.tar.bz2
          echo "✅ Boost installed"

      - name: Setup RapidJSON
        run: |
          if [ ! -d "rapidjson" ]; then
            echo "📦 Cloning RapidJSON..."
            git clone --depth 1 https://github.com/Tencent/rapidjson.git
          fi
          echo "RAPIDJSON_ROOT=${{ github.workspace }}/rapidjson/include" >> $GITHUB_ENV
          echo "✅ RapidJSON ready"

      - name: Setup libcurl for Android
        run: |
          CURL_H_PATH=$(find /usr/include -name "curl.h" | head -n 1)
          if [ -n "$CURL_H_PATH" ]; then
            CURL_DIR=$(dirname "$CURL_H_PATH")
            mkdir -p ${{ github.workspace }}/curl_flat
            cp -r $CURL_DIR/* ${{ github.workspace }}/curl_flat/
            echo "CURL_INCLUDE_PATH=${{ github.workspace }}/curl_flat" >> $GITHUB_ENV
            echo "✅ Curl include configured"
          fi

      - name: Create missing headers
        run: |
          mkdir -p common.shared/config
          cat > common.shared/config/config_data.h << 'EOF'
          #pragma once
          #include <string>
          namespace config {
              inline std::string config_json() { return "{}"; }
          }
          EOF
          cat > common.shared/loader_errors.h << 'EOF'
          #pragma once
          enum class loader_errors {
              success = 0,
              network_error,
              load_failure,
              parse_failure,
              invalid_json,
              come_back_later,
              http_client_error,
              file_error,
              cancelled
          };
          EOF
          mkdir -p core/voip
          if [ ! -f "core/voip/voip3.h" ]; then
            echo '#include "../Voip/VoipManager.h"' > core/voip/voip3.h
          fi
          echo "✅ Missing headers created"

      - name: Create VoipManagerDefines.h
        run: |
          mkdir -p core/Voip
          cat > core/Voip/VoipManagerDefines.h << 'EOF'
          #pragma once
          #include <string>
          #include <vector>
          #include <memory>
          #include <voip/voip3.h>
          #define PREVIEW_RENDER_NAME "@camera_stream_id"
          #define DEFAULT_DEVICE_UID "default_device"
          namespace voip {
              using CallId = std::string;
              using PeerId = std::string;
              enum DeviceType { AudioRecording = 0, AudioPlayback, VideoCapturing };
              enum DeviceClass { Audio = 0, Video };
              enum VideoCaptureType { VC_DeviceCamera, VC_DeviceVirtualCamera, VC_DeviceDesktop };
          }
          namespace voip_manager {
              using namespace voip;
              struct Contact { voip::CallId call_id; std::string contact; };
              struct ContactEx { Contact contact; std::string call_type; };
              struct device_description { std::string uid; std::string name; DeviceType type; };
              struct WindowParams { void* hwnd; voip::CallId call_id; };
              struct VoipProtoMsg { std::string account_uid; int msg_type; std::vector<char> data; };
              struct CallStartParams { bool video = false; };
              class VoipManager {
              public:
                  virtual ~VoipManager() = default;
                  virtual void call_create(const std::vector<std::string>&, std::string&, bool) = 0;
                  virtual void call_stop() = 0;
                  virtual void call_accept(const voip::CallId&, const std::string&, bool) = 0;
                  virtual void call_decline(const Contact&, bool, bool) = 0;
                  virtual void call_terminate(const voip::CallId&, voip::TerminateReason) = 0;
                  virtual void get_device_list(DeviceType, std::vector<device_description>&) = 0;
                  virtual void set_device(DeviceType, const std::string&, bool) = 0;
                  virtual void window_add(WindowParams&) = 0;
                  virtual void window_remove(void*) = 0;
                  virtual void media_video_en(bool) = 0;
                  virtual void media_audio_en(bool) = 0;
                  virtual void ProcessVoipMsg(const std::string&, int, const char*, unsigned) = 0;
                  virtual void ProcessVoipAck(const VoipProtoMsg&, bool) = 0;
                  virtual void reset() = 0;
                  virtual void update() = 0;
              };
          }
          EOF
          echo "✅ VoipManagerDefines.h created"

      - name: Fix base_im.h
        run: |
          if [ -f "core/connections/base_im.h" ]; then
            sed -i 's/voip::voip::/voip::/g' core/connections/base_im.h
            if ! grep -q "#include.*VoipManagerDefines" core/connections/base_im.h; then
              sed -i '1i#include "../Voip/VoipManagerDefines.h"' core/connections/base_im.h
            fi
            echo "✅ Fixed base_im.h"
          fi

      - name: Remove conflicting icore_interface.h
        run: |
          if [ -f "core/icore_interface.h" ]; then
            rm core/icore_interface.h
            echo "✅ Removed conflicting icore_interface.h"
          fi

      - name: Fix includes in proxy_settings.h
        run: |
          if [ -f "core/proxy_settings.h" ]; then
            if ! grep -q "tools/binary_stream.h" "core/proxy_settings.h"; then
              sed -i '1i#include "tools/binary_stream.h"\n#include "tools/tlv.h"' core/proxy_settings.h
            fi
          fi

      - name: Fix includes in im_stats.h
        run: |
          if [ -f "core/stats/im/im_stats.h" ]; then
            if ! grep -q "rapidjson/document.h" "core/stats/im/im_stats.h"; then
              sed -i '1i#include <rapidjson/document.h>\n#include <rapidjson/writer.h>\n#include <rapidjson/stringbuffer.h>' core/stats/im/im_stats.h
            fi
          fi

      - name: Fix CMakeLists.txt
        run: |
          cat > app/src/main/cpp/CMakeLists.txt << 'EOFCMake'
          cmake_minimum_required(VERSION 3.22.1)
          cmake_policy(SET CMP0074 NEW)
          project("icq_mobile_core")

          if(NOT ICQ_PROJECT_ROOT)
              set(ICQ_ROOT "${CMAKE_CURRENT_SOURCE_DIR}/../../../../")
          else()
              set(ICQ_ROOT "${ICQ_PROJECT_ROOT}")
          endif()

          set(QT_FOUND FALSE)

          if(QT_ANDROID_PATH AND QT_HOST_PATH)
              set(Qt6_DIR "${QT_ANDROID_PATH}/lib/cmake/Qt6")
              set(CMAKE_PREFIX_PATH "${QT_ANDROID_PATH}/lib/cmake")
              set(QT_HOST_PATH "${QT_HOST_PATH}")
              find_package(Qt6 CONFIG QUIET COMPONENTS Core Network)
              if(Qt6_FOUND)
                  set(QT_FOUND TRUE)
              endif()
          elseif(DEFINED ENV{Qt6_ANDROID_DIR})
              set(QT_ANDROID_PATH "$ENV{Qt6_ANDROID_DIR}")
              set(QT_HOST_PATH "$ENV{Qt6_DIR}")
              set(Qt6_DIR "${QT_ANDROID_PATH}/lib/cmake/Qt6")
              set(CMAKE_PREFIX_PATH "${QT_ANDROID_PATH}/lib/cmake")
              find_package(Qt6 CONFIG QUIET COMPONENTS Core Network)
              if(Qt6_FOUND)
                  set(QT_FOUND TRUE)
              endif()
          else()
              find_package(Qt6 CONFIG QUIET COMPONENTS Core Network)
              if(Qt6_FOUND)
                  set(QT_FOUND TRUE)
              endif()
          endif()

          if(NOT QT_FOUND)
              message(FATAL_ERROR "❌ Qt6 is REQUIRED but not found")
          endif()

          add_compile_definitions(
              LINUX __linux__ ANDROID
              STRIP_CRASH_HANDLER
              SUPPORT_EXTERNAL_CONFIG
              HAVE_SECURE_GETENV=1
              _FORTIFY_SOURCE=2
              QT_CORE_LIB QT_NETWORK_LIB
          )

          file(GLOB_RECURSE CORE_SOURCES
              "${ICQ_ROOT}/core/*.cpp"
              "${ICQ_ROOT}/common.shared/*.cpp"
              "${ICQ_ROOT}/corelib/*.cpp"
              "${ICQ_ROOT}/gui.shared/*.cpp"
          )

          list(FILTER CORE_SOURCES EXCLUDE REGEX ".*(win32|macos|apple|linux_desktop|test|stdafx\\.cpp|unittests|_mac|_ios).*")

          add_library(icq_core SHARED
              jni_bridge.cpp
              ${CORE_SOURCES}
          )

          target_include_directories(icq_core PRIVATE
              ${CMAKE_CURRENT_SOURCE_DIR}
              ${ICQ_ROOT}                                
              ${ICQ_ROOT}/core                           
              ${ICQ_ROOT}/core/Voip/libvoip/include
              ${ICQ_ROOT}/core/Voip/libvoip/src
              ${ICQ_ROOT}/corelib
              ${ICQ_ROOT}/common.shared
              ${ICQ_ROOT}/gui.shared
              ${ICQ_ROOT}/boost_1_83_0
              ${ICQ_ROOT}/rapidjson/include
              $ENV{CURL_INCLUDE_PATH}
              ${Qt6Core_INCLUDE_DIRS}
              ${Qt6Network_INCLUDE_DIRS}
          )

          set_target_properties(icq_core PROPERTIES
              CXX_STANDARD 17
              CXX_STANDARD_REQUIRED ON
              POSITION_INDEPENDENT_CODE ON
              CXX_VISIBILITY_PRESET hidden
              VISIBILITY_INLINES_HIDDEN ON
          )

          target_compile_options(icq_core PRIVATE 
              -fexceptions -frtti -fPIC -Wall 
              -Wno-unused-parameter -Wno-unused-variable -Wno-mismatched-tags
              -fdata-sections -ffunction-sections
          )

          find_library(log-lib log REQUIRED)
          find_library(z-lib z REQUIRED)
          find_library(android-lib android REQUIRED)

          target_link_libraries(icq_core
              Qt6::Core
              Qt6::Network
              ${log-lib}
              ${z-lib}
              ${android-lib}
              -Wl,--gc-sections
          )

          if(ANDROID)
              target_link_options(icq_core PRIVATE "-Wl,--undefined=JNI_OnLoad")
              qt_finalize_target(icq_core)
              target_compile_definitions(icq_core PRIVATE __ANDROID_API__=24)
          endif()

          message(STATUS "=====================================================")
          message(STATUS "ICQ Mobile Core Build Configuration")
          message(STATUS "=====================================================")
          message(STATUS "  ICQ_ROOT: ${ICQ_ROOT}")
          message(STATUS "  Qt Version: ${Qt6_VERSION}")
          message(STATUS "=====================================================")
          EOFCMake
          echo "✅ CMakeLists.txt created"

      - name: Fix jni_bridge.cpp
        run: |
          cat > app/src/main/cpp/jni_bridge.cpp << 'EOFJNI'
          #include <jni.h>
          #include <string>
          #include <memory>
          #include <mutex>
          #include <android/log.h>

          #include "core/stdafx.h"
          #include "gui/core_dispatcher.h"

          #define LOG_TAG "IcqCoreJNI"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)

          JavaVM* g_jvm = nullptr;
          static std::unique_ptr<Ui::core_dispatcher> g_core;
          static jobject g_event_callback_obj = nullptr;
          static std::shared_ptr<core::icore_interface> g_gui_callback;
          static std::mutex g_core_mutex;

          class AndroidGuiCallback : public core::icore_interface {
          public:
              virtual int32_t addref() override { return 1; }
              virtual int32_t release() override { return 0; }
              
              void receive_variable(const std::string& _name, core::coll_ptr _value) override {
                  notify_java_event(_name);
              }
              void receive_package(const std::string& _name, core::coll_ptr _value) override {
                  notify_java_event(_name);
              }
              void on_voip_proto_msg(const std::string& _account, const std::vector<char>& _data) override {
                  notify_java_event("voip_proto_msg");
              }
              void send_statistic_event(const std::string& _event, const core::event_props_type& _props) override {
                  LOGI("Core Statistic Event: %s", _event.c_str());
              }
              std::string get_device_id() override {
                  return "android_device_id_stable";
              }
              core::iconnector* get_core_connector() override { 
                  return g_core ? g_core->get_core_connector() : nullptr;
              }
              core::iconnector* get_gui_connector() override { 
                  return g_core ? g_core->get_gui_connector() : nullptr;
              }
              core::icore_factory* get_factory() override { 
                  return g_core ? g_core->get_factory() : nullptr;
              }
          private:
              void notify_java_event(const std::string& _event_name) {
                  if (!g_jvm || !g_event_callback_obj) return;
                  JNIEnv* env = nullptr;
                  bool attached = false;
                  jint res = g_jvm->GetEnv(reinterpret_cast<void**>(&env), JNI_VERSION_1_6);
                  if (res == JNI_EDETACHED) {
                      if (g_jvm->AttachCurrentThread(&env, nullptr) != JNI_OK) {
                          LOGE("Failed to attach thread to JVM");
                          return;
                      }
                      attached = true;
                  }
                  jclass callbackClass = env->GetObjectClass(g_event_callback_obj);
                  jmethodID methodId = env->GetMethodID(callbackClass, "onCoreEvent", "(Ljava/lang/String;)V");
                  if (methodId) {
                      jstring jName = env->NewStringUTF(_event_name.c_str());
                      env->CallVoidMethod(g_event_callback_obj, methodId, jName);
                      env->DeleteLocalRef(jName);
                  }
                  env->DeleteLocalRef(callbackClass);
                  if (attached) g_jvm->DetachCurrentThread();
              }
          };

          JNIEXPORT jint JNICALL JNI_OnLoad(JavaVM* vm, void* reserved) {
              g_jvm = vm;
              return JNI_VERSION_1_6;
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_icq_mobile_core_IcqCoreEngine_nativeInit(JNIEnv *env, jobject thiz, jstring data_path, jstring cache_path, jobject callback) {
              std::lock_guard<std::mutex> lock(g_core_mutex);
              if (g_core) { LOGI("Core Engine already running."); return; }
              if (g_event_callback_obj) env->DeleteGlobalRef(g_event_callback_obj);
              g_event_callback_obj = env->NewGlobalRef(callback);
              auto callback_impl = std::make_shared<AndroidGuiCallback>();
              g_gui_callback = std::static_pointer_cast<core::icore_interface>(callback_impl);
              const char *data_path_cstr = env->GetStringUTFChars(data_path, nullptr);
              const char *cache_path_cstr = env->GetStringUTFChars(cache_path, nullptr);
              std::string internal_data_path(data_path_cstr);
              std::string internal_cache_path(cache_path_cstr);
              env->ReleaseStringUTFChars(data_path, data_path_cstr);
              env->ReleaseStringUTFChars(cache_path, cache_path_cstr);
              common::core_gui_settings settings;
              settings.os_version_ = "Android";
              settings.locale_ = "ru_RU";
              settings.recents_avatars_size_ = 120;
              g_core = std::make_unique<Ui::core_dispatcher>();
              g_core->link_gui(g_gui_callback, settings);
              LOGI("Core Engine started successfully");
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_icq_mobile_core_IcqCoreEngine_nativeInit(JNIEnv *env, jobject thiz, jstring data_path, jstring cache_path, jobject callback) {
              std::lock_guard<std::mutex> lock(g_core_mutex);
              if (g_core) { LOGI("Core Engine already running."); return; }
              if (g_event_callback_obj) env->DeleteGlobalRef(g_event_callback_obj);
              g_event_callback_obj = env->NewGlobalRef(callback);
              auto callback_impl = std::make_shared<AndroidGuiCallback>();
              g_gui_callback = std::static_pointer_cast<core::icore_interface>(callback_impl);
              const char *data_path_cstr = env->GetStringUTFChars(data_path, nullptr);
              const char *cache_path_cstr = env->GetStringUTFChars(cache_path, nullptr);
              std::string internal_data_path(data_path_cstr);
              std::string internal_cache_path(cache_path_cstr);
              env->ReleaseStringUTFChars(data_path, data_path_cstr);
              env->ReleaseStringUTFChars(cache_path, cache_path_cstr);
              common::core_gui_settings settings;
              settings.os_version_ = "Android";
              settings.locale_ = "ru_RU";
              settings.recents_avatars_size_ = 120;
              g_core = std::make_unique<Ui::core_dispatcher>();
              g_core->link_gui(g_gui_callback, settings);
              LOGI("Core Engine started successfully");
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_icq_mobile_core_IcqCoreEngine_nativeShutdown(JNIEnv *env, jobject thiz) {
              std::lock_guard<std::mutex> lock(g_core_mutex);
              if (g_core) { g_core->unlink_gui(); g_core.reset(); LOGI("Core Engine destroyed."); }
              if (g_event_callback_obj) { env->DeleteGlobalRef(g_event_callback_obj); g_event_callback_obj = nullptr; }
              g_gui_callback.reset();
          }
          EOFJNI
          echo "✅ jni_bridge.cpp created"

      - name: Fix permissions
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          ./gradlew :app:assembleDebug \
            -Pqt.android.path="${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a" \
            -Pqt.host.path="${{ github.workspace }}/Qt/6.5.0/gcc_64" \
            -Pboost.root="${{ github.workspace }}/boost_1_83_0" \
            -Prapidjson.root="${{ github.workspace }}/rapidjson/include" \
            --stacktrace 2>&1 | tee build.log
        env:
          CURL_INCLUDE_PATH: ${{ github.workspace }}/curl_flat
          Qt6_DIR: ${{ github.workspace }}/Qt/6.5.0/gcc_64
          Qt6_ANDROID_DIR: ${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a
          BOOST_ROOT: ${{ github.workspace }}/boost_1_83_0
          RAPIDJSON_ROOT: ${{ github.workspace }}/rapidjson/include

      - name: Save build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Native Reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cxx-logs
          path: |
            app/.cxx/**/*.log
            app/build/reports/
            build.log
          retention-days: 7
