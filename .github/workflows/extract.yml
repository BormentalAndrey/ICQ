# .github/workflows/extract-all-archives.yml
name: Extract All Archives

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and extract all archives
        run: |
          echo "ПОИСК И РАСПАКОВКА АРХИВОВ"
          
          # Находим все архивы
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.tar.bz2" \) 2>/dev/null | while read archive; do
            echo ""
            echo "Архив: $archive"
            
            dir=$(dirname "$archive")
            cd "$dir"
            
            if [[ "$archive" == *.zip ]]; then
              unzip -o "$(basename "$archive")" 2>/dev/null
            elif [[ "$archive" == *.tar.gz ]]; then
              tar -xzf "$(basename "$archive")" 2>/dev/null
            elif [[ "$archive" == *.tar.bz2 ]]; then
              tar -xjf "$(basename "$archive")" 2>/dev/null
            fi
            
            cd - > /dev/null
            echo "✅ Распаковано: $archive"
          done

      - name: Remove archives
        run: |
          git config user.name "GitHub Actions Bot"
          git config.user.email "actions@github.com"
          
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.tar.bz2" \) -exec git rm {} \; 2>/dev/null || true
          
          git add -A
          git commit -m "Extract and remove archives" || echo "No changes"
          git push
