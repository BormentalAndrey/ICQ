# .github/workflows/cleanup-old-parts.yml
name: Cleanup Old Parts

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove old parts
        run: |
          echo "Удаление старых частей..."
          
          # Удаляем старые части
          rm -f icq-dependencies.part.*
          rm -f icq-dependencies.zip
          
          # Добавляем изменения
          git add -A
          git commit -m "Remove old parts" || echo "No changes"
          git push
