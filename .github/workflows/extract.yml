name: Unzip All Archives

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  unzip-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip all archives in their locations
        run: |
          # Ищем все файлы .zip и распаковываем их в их же директории
          find . -name "*.zip" -type f -exec sh -c '
            zip_file="$1"
            dest_dir=$(dirname "$zip_file")
            echo "Распаковка $zip_file в $dest_dir..."
            unzip -o "$zip_file" -d "$dest_dir"
          ' _ {} \;

      - name: Check results
        run: ls -R
