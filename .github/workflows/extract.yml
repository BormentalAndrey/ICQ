# .github/workflows/assemble-dependencies.yml
name: Assemble ICQ Dependencies

on:
  push:
    branches: [ main, master ]
    paths:
      - 'icq-dependencies.part.*'
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble from parts
        run: |
          echo "========================================="
          echo "СБОРКА АРХИВА ИЗ ЧАСТЕЙ"
          echo "========================================="
          
          echo ""
          echo "📁 Найденные части:"
          ls -la icq-dependencies.part.*
          
          echo ""
          echo "🔧 Собираем архив..."
          cat icq-dependencies.part.* > icq-dependencies.zip
          
          echo ""
          echo "✅ Архив собран:"
          ls -lh icq-dependencies.zip
          
          echo ""
          echo "🔍 Проверка архива:"
          if unzip -t icq-dependencies.zip > /dev/null 2>&1; then
            echo "   ✅ Архив корректный"
            SIZE=$(du -h icq-dependencies.zip | cut -f1)
            echo "   📦 Размер: $SIZE"
          else
            echo "   ❌ Архив поврежден!"
            exit 1
          fi

      - name: Remove parts
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git rm icq-dependencies.part.*
          git add icq-dependencies.zip
          git commit -m "Assemble ICQ dependencies archive from parts" || echo "Нет изменений"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: icq-dependencies
          path: icq-dependencies.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: icq-dependencies.zip
          name: ICQ Dependencies ${{ github.ref_name }}
          body: |
            ## ICQ Dependencies Bundle
            
            Полный архив зависимостей ICQ.
            
            ### Размер: 551 MB
            ### Содержимое:
            - Qt5 libraries
            - Boost
            - RapidJSON
            - curl
            - Другие зависимости
            
            ### Использование:
            ```bash
            unzip icq-dependencies.zip
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
