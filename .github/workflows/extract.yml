name: Sync Dependencies to Repository

on:
  workflow_dispatch: # Запуск вручную кнопкой в Actions

jobs:
  sync-deps:
    runs-on: ubuntu-latest
    # Даем права на запись в репозиторий
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Полная история для корректного push

      - name: Install aqtinstall
        run: pip3 install aqtinstall

      - name: Download Qt 6.5.0
        run: |
          mkdir -p Qt
          # Android компоненты
          python3 -m aqt install-qt linux android 6.5.0 android_arm64_v8a --outputdir ${{ github.workspace }}/Qt
          # Desktop компоненты (инструменты хоста)
          python3 -m aqt install-qt linux desktop 6.5.0 gcc_64 --outputdir ${{ github.workspace }}/Qt

      - name: Download Boost 1.83.0
        run: |
          wget -q https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.gz
          tar -xzf boost_1_83_0.tar.gz
          rm boost_1_83_0.tar.gz

      - name: Download RapidJSON
        run: |
          git clone --depth 1 https://github.com/Tencent/rapidjson.git

      - name: Commit and Push Changes
        run: |
          # Настройка бота
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Удаляем папки из .gitignore, если они там были (чтобы git add сработал)
          sed -i '/Qt\//d' .gitignore || true
          sed -i '/boost_1_83_0\//d' .gitignore || true
          sed -i '/rapidjson\//d' .gitignore || true
          
          # Добавляем все скачанные файлы
          git add Qt/
          git add boost_1_83_0/
          git add rapidjson/
          
          # Фиксируем изменения, если они есть
          if git diff --staged --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "chore: add dependencies (Qt 6.5, Boost, RapidJSON)"
            git push origin main
          fi
