name: Build ICQ for Android

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
      arch:
        description: 'Architecture'
        required: true
        default: 'all'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - all

env:
  QT_VERSION: '5.15.2'
  ANDROID_API_LEVEL: '33'
  NDK_VERSION: '21.3.6528147' # Оптимальная версия для Qt 5.15.2

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: get-version
        run: |
          VERSION=$(grep -oP '(?<=VERSION ).*' VERSION 2>/dev/null || echo "1.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(github.event.inputs.arch == 'all' && '["arm64-v8a", "armeabi-v7a", "x86_64"]' || format('["{0}"]', github.event.inputs.arch || 'arm64-v8a')) }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Map Architecture
        id: map
        run: |
          case "${{ matrix.arch }}" in
            arm64-v8a) echo "qt_arch=android_arm64_v8a" >> $GITHUB_OUTPUT ;;
            armeabi-v7a) echo "qt_arch=android_armv7" >> $GITHUB_OUTPUT ;;
            x86_64) echo "qt_arch=android_x86_64" >> $GITHUB_OUTPUT ;;
          esac

      - name: Install JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Qt & Android Tools
        run: |
          pip3 install aqtinstall
          # Установка Qt со всеми необходимыми модулями для ICQ
          python3 -m aqt install-qt linux android $QT_VERSION ${{ steps.map.outputs.qt_arch }} \
            --outputdir ${{ github.workspace }}/Qt \
            -m qtcharts qtgraphicaleffects qtmultimedia qtquickcontrols qtquickcontrols2 qtsvg qtxmlpatterns
          
          python3 -m aqt install-tool linux android --outputdir ${{ github.workspace }}/Qt android_sdk
          python3 -m aqt install-ndk linux android $NDK_VERSION --outputdir ${{ github.workspace }}/Qt

      - name: Download OpenSSL for Android (Required for Production)
        run: |
          # Qt 5.15 на Android требует OpenSSL 1.1.1
          mkdir -p ${{ github.workspace }}/openssl
          cd ${{ github.workspace }}/openssl
          curl -L https://github.com/KDAB/android_openssl/archive/refs/heads/master.tar.gz | tar xz --strip-components=1

      - name: Set Env
        run: |
          echo "QT_ROOT=${{ github.workspace }}/Qt/$QT_VERSION/${{ steps.map.outputs.qt_arch }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${{ github.workspace }}/Qt/Tools/ndk/$NDK_VERSION" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${{ github.workspace }}/Qt/Tools/android-sdk" >> $GITHUB_ENV
          echo "OPENSSL_PATH=${{ github.workspace }}/openssl" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential libgl1-mesa-dev

      - name: Prepare Android Filesystem
        run: |
          mkdir -p android/res/values android/res/drawable
          # Создаем базовый манифест, если его нет
          if [ ! -f android/AndroidManifest.xml ]; then
            cat > android/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.icq.desktop" android:versionCode="1" android:versionName="1.0">
              <application android:label="ICQ" android:name="org.qtproject.qt5.android.bindings.QtApplication" android:icon="@drawable/ic_launcher">
                  <activity android:name="org.qtproject.qt5.android.bindings.QtActivity" android:configChanges="orientation|uiMode|screenLayout|screenSize" android:launchMode="singleTop">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <meta-data android:name="android.app.lib_name" android:value="ICQ" />
                  </activity>
              </application>
              <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="33" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
          </manifest>
          EOF
          fi

      - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.arch }} \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }} \
            -DQt5_DIR=$QT_ROOT/lib/cmake/Qt5 \
            -G Ninja
          ninja

      - name: Find Binary
        id: find_bin
        run: |
          BIN_PATH=$(find build -name "lib*.so" -type f | head -n 1)
          echo "path=$BIN_PATH" >> $GITHUB_OUTPUT

      - name: Deploy APK
        run: |
          # Создание файла настроек деплоя
          cat > build/deploy_settings.json << EOF
          {
             "qt": "$QT_ROOT",
             "sdk": "$ANDROID_SDK_ROOT",
             "ndk": "$ANDROID_NDK_ROOT",
             "target-architecture": "${{ matrix.arch }}",
             "android-package-source": "${{ github.workspace }}/android",
             "android-package-name": "com.icq.desktop",
             "application-binary": "${{ github.workspace }}/${{ steps.find_bin.outputs.path }}",
             "openssl-libs-path": "$OPENSSL_PATH/${{ matrix.arch }}",
             "deployment-dependencies": "plugins/platforms/android/libqtforandroid.so"
          }
          EOF
          
          $QT_ROOT/bin/androiddeployqt \
            --input build/deploy_settings.json \
            --output build/android-build \
            --android-platform android-33 \
            --jdk $JAVA_HOME \
            --gradle \
            ${{ github.event.inputs.build_type == 'release' && '--release' || '' }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ICQ-${{ matrix.arch }}-${{ github.event.inputs.build_type }}
          path: build/android-build/build/outputs/apk/**/*.apk

  release:
    needs: [prepare, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.apk
          name: ICQ Android ${{ needs.prepare.outputs.version }}
          body: "Автоматическая сборка ICQ для Android. Архитектуры: ARM64, ARMv7, x86_64."
