name: Build ICQ for Android

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      arch:
        description: 'Architecture'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - all

env:
  QT_VERSION: '5.15.2'
  ANDROID_API_LEVEL: '33'
  NDK_VERSION: '21.3.6528147'

jobs:
  prepare-android:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      build_date: ${{ steps.get-date.outputs.date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get-version
        run: |
          if [ -f "VERSION" ]; then
            VERSION=$(cat VERSION)
          elif [ -f "version.txt" ]; then
            VERSION=$(cat version.txt)
          else
            VERSION="1.0.0-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get current date
        id: get-date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

  build-android:
    needs: prepare-android
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(github.event.inputs.arch == 'all' && '["arm64-v8a", "armeabi-v7a", "x86_64"]' || format('["{0}"]', github.event.inputs.arch || 'arm64-v8a')) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Map architecture to Qt arch
        id: map-arch
        run: |
          case "${{ matrix.arch }}" in
            arm64-v8a)
              echo "qt_arch=android_arm64_v8a" >> $GITHUB_OUTPUT
              echo "ndk_abi=arm64-v8a" >> $GITHUB_OUTPUT
              echo "ndk_host=aarch64-linux-android" >> $GITHUB_OUTPUT
              ;;
            armeabi-v7a)
              echo "qt_arch=android_armv7" >> $GITHUB_OUTPUT
              echo "ndk_abi=armeabi-v7a" >> $GITHUB_OUTPUT
              echo "ndk_host=arm-linux-androideabi" >> $GITHUB_OUTPUT
              ;;
            x86_64)
              echo "qt_arch=android_x86_64" >> $GITHUB_OUTPUT
              echo "ndk_abi=x86_64" >> $GITHUB_OUTPUT
              echo "ndk_host=x86_64-linux-android" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Qt for Android
        run: |
          pip3 install --upgrade aqtinstall

          echo "=== Available architectures ==="
          python3 -m aqt list-qt linux android --arch $QT_VERSION

          echo "=== Available modules for ${{ steps.map-arch.outputs.qt_arch }} ==="
          python3 -m aqt list-qt linux android --modules $QT_VERSION ${{ steps.map-arch.outputs.qt_arch }} || true

          echo "=== Installing Qt \( QT_VERSION ( \){{ steps.map-arch.outputs.qt_arch }}) ==="
          python3 -m aqt install-qt linux android $QT_VERSION ${{ steps.map-arch.outputs.qt_arch }} \
            --outputdir ${{ github.workspace }}/Qt \
            --modules qtdeclarative qtmultimedia qtsvg qtimageformats qtandroidextras qtnetworkauth qtquickcontrols2 qtgraphicaleffects

          python3 -m aqt install-tool linux android --outputdir ${{ github.workspace }}/Qt android_sdk
          python3 -m aqt install-ndk linux android $NDK_VERSION --outputdir ${{ github.workspace }}/Qt

      - name: Set environment variables
        run: |
          echo "QT_ROOT=${{ github.workspace }}/Qt/\( QT_VERSION/ \){{ steps.map-arch.outputs.qt_arch }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${{ github.workspace }}/Qt/Tools/ndk/$NDK_VERSION" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${{ github.workspace }}/Qt/Tools/android-sdk" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxkbcommon-x11-0 libpulse-dev libasound2-dev libssl-dev \
            libxcb-util1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xfixes0 libxcb-sync1 libxcb-shm0 libxcb-xv0

      - name: Create Android resources (fallback)
        run: |
          mkdir -p android/res/{values,drawable,drawable-hdpi,drawable-mdpi,drawable-xhdpi,drawable-xxhdpi,drawable-xxxhdpi}

          cat > android/AndroidManifest.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.icq.desktop"
    android:versionCode="${{ github.run_number }}"
    android:versionName="${{ needs.prepare-android.outputs.version }}">

    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    <uses-permission android:name="android.permission.WAKE_LOCK" />
    <uses-permission android:name="android.permission.VIBRATE" />
    <uses-permission android:name="android.permission.RECORD_AUDIO" />
    <uses-permission android:name="android.permission.CAMERA" />
    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />

    <uses-feature android:name="android.hardware.camera" android:required="false" />
    <uses-feature android:name="android.hardware.microphone" android:required="false" />
    <uses-feature android:glEsVersion="0x00020000" android:required="true" />

    <application
        android:allowBackup="true"
        android:icon="@drawable/ic_launcher"
        android:label="ICQ"
        android:name="org.qtproject.qt5.android.bindings.QtApplication"
        android:supportsRtl="true">

        <activity
            android:name="org.qtproject.qt5.android.bindings.QtActivity"
            android:configChanges="orientation|keyboardHidden|screenSize|locale|layoutDirection|uiMode"
            android:launchMode="singleTop"
            android:windowSoftInputMode="adjustResize"
            android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
            <meta-data android:name="android.app.lib_name" android:value="ICQ" />
        </activity>
    </application>

    <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="33" />
</manifest>
EOF

          cat > android/res/drawable/ic_launcher.xml << 'EOF'
<vector xmlns:android="http://schemas.android.com/apk/res/android"
    android:width="48dp"
    android:height="48dp"
    android:viewportWidth="24"
    android:viewportHeight="24">
  <path android:fillColor="#00A0E0" android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2z"/>
  <path android:fillColor="#FFFFFF" android:pathData="M8,8h8v8h-8z"/>
</vector>
EOF

          cat > android/res/values/strings.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">ICQ</string>
</resources>
EOF

      - name: Patch CMakeLists.txt for Android
        run: |
          if ! grep -q "ANDROID" CMakeLists.txt; then
            echo "Добавляем поддержку Android в CMakeLists.txt"
            cat >> CMakeLists.txt << 'EOF'

# Android support (injected by CI)
if(ANDROID)
    set(ICQ_PLATFORM android)
    message(STATUS "Building for Android platform")
    add_definitions(-DANDROID -DQT_ANDROID)

    find_package(Qt5 REQUIRED COMPONENTS
        Core
        AndroidExtras
        Multimedia
        Network
        Qml
        Quick
        Svg
    )

    set(CMAKE_SHARED_LINKER_FLAGS "\( {CMAKE_SHARED_LINKER_FLAGS} -Wl,-rpath-link= \){CMAKE_CURRENT_BINARY_DIR}")
endif()
EOF
          fi

      - name: Configure CMake
        run: |
          mkdir -p build-android
          cd build-android

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ steps.map-arch.outputs.ndk_abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_shared \
            -DANDROID_NATIVE_API_LEVEL=21 \
            -DANDROID=ON \
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }} \
            -DQt5_DIR="$QT_ROOT/lib/cmake/Qt5" \
            -DQT_ANDROID_APPLICATION_DIR="${{ github.workspace }}/android" \
            -GNinja

      - name: Build Native Libraries
        run: |
          cd build-android
          ninja -v || make -j$(nproc)

      - name: Detect main shared library
        run: |
          cd build-android
          MAIN_SO=$(find . -name "lib*.so" -type f | grep -iE 'icq|core|client|main' | head -1 | sed 's|^\./||')
          [ -z "$MAIN_SO" ] && MAIN_SO="libicq.so"
          echo "MAIN_SO=$MAIN_SO" >> $GITHUB_ENV
          echo "Главная библиотека: $MAIN_SO"

      - name: Create Deployment Settings
        run: |
          cd build-android
          cat > android-deployment-settings.json << EOF
{
    "description": "ICQ for Android",
    "qt": "$QT_ROOT",
    "sdk": "$ANDROID_SDK_ROOT",
    "ndk": "$ANDROID_NDK_ROOT",
    "target-architecture": "${{ matrix.arch }}",
    "android-package-source": "${{ github.workspace }}/android",
    "application-binary": "\( {{ github.workspace }}/build-android/ \){{ env.MAIN_SO }}",
    "android-package-name": "com.icq.desktop",
    "version-name": "${{ needs.prepare-android.outputs.version }}",
    "version-code": ${{ github.run_number }},
    "ndk-host": "linux-x86_64"
}
EOF

      - name: Create APK with androiddeployqt
        run: |
          cd build-android

          $QT_ROOT/bin/androiddeployqt \
            --input android-deployment-settings.json \
            --output android-build \
            --deployment bundled \
            --android-platform android-$ANDROID_API_LEVEL \
            --jdk $JAVA_HOME \
            --gradle \
            --verbose \
            ${{ github.event.inputs.build_type == 'release' && '--release' || '' }}

          APK_FILE=$(find android-build -name "*.apk" | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "\( APK_FILE" ../icq-android- \){{ matrix.arch }}-${{ github.event.inputs.build_type || 'debug' }}.apk
            echo "APK создан: icq-android-\( {{ matrix.arch }}- \){{ github.event.inputs.build_type || 'debug' }}.apk"
          else
            echo "APK не найден"
            exit 1
          fi

      - name: Generate build info
        run: |
          cat > build-info-${{ matrix.arch }}.txt << EOF
ICQ Android Build
=================
Version: ${{ needs.prepare-android.outputs.version }}
Date: $(date)
Commit: ${{ github.sha }}
Arch: ${{ matrix.arch }}
Build type: ${{ github.event.inputs.build_type || 'debug' }}
Number: ${{ github.run_number }}
EOF

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: icq-android-\( {{ matrix.arch }}- \){{ github.event.inputs.build_type || 'debug' }}
          path: |
            icq-android-\( {{ matrix.arch }}- \){{ github.event.inputs.build_type || 'debug' }}.apk
            build-info-${{ matrix.arch }}.txt
          retention-days: 30

  create-release:
    needs: [prepare-android, build-android]
    if: startsWith(github.ref, 'refs/tags/v') && success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ICQ Android ${{ needs.prepare-android.outputs.version }}
          body: |
            ## ICQ для Android v${{ needs.prepare-android.outputs.version }}

            Полноценная сборка оригинального ICQ Desktop 2016 под Android.

            Поддерживаемые архитектуры:
            - ARM64-v8a
            - ARMv7-a
            - x86_64

            Технические характеристики:
            - Qt 5.15.2
            - NDK r21
            - minSdk 21 / targetSdk 33

            Установка:
            1. Скачайте APK
            2. Разрешите установку из неизвестных источников
            3. Установите

            Сборка: ${{ needs.prepare-android.outputs.build_date }}
            Коммит: [\( {{ github.sha }}](https://github.com/ \){{ github.repository }}/commit/${{ github.sha }})
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
