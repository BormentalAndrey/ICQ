name: Android CI Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # На случай, если зависимости подключены как субмодули

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: "26.1.10909125"

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build with Gradle
        # 2>&1 | tee build.log объединяет ошибки и текст в один файл и выводит в консоль
        run: ./gradlew assembleRelease --info --stacktrace 2>&1 | tee build.log

      - name: Upload Build Artifacts (Logs)
        # if: always() гарантирует выполнение, даже если предыдущий шаг упал
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: all-build-logs
          path: |
            build.log
            **/build/reports/
            **/build/test-results/
            **/.cxx/**/CMakeCache.txt
            **/.cxx/**/ninja_log
            **/.cxx/**/android_gradle_build_stderr.txt
            **/build/intermediates/cxx/**/ninja.log
          retention-days: 7

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
