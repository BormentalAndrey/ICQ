# .github/workflows/assemble-dependencies.yml
name: Assemble ICQ Dependencies

on:
  push:
    branches: [ main, master ]
    paths:
      - 'icq-dependencies.part.*'
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble from parts
        run: |
          echo "Сборка архива из частей..."
          cat icq-dependencies.part.* > icq-dependencies.zip
          ls -lh icq-dependencies.zip

      - name: Remove parts and commit
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git rm icq-dependencies.part.*
          git add icq-dependencies.zip
          git commit -m "Assemble ICQ dependencies from parts"
          git push
