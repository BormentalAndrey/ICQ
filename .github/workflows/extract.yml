name: Build ICQ Mobile

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;25.1.8937393' # Рекомендуется NDK 25 для Qt 6.5.0
          cmdline-tools-version: 'latest'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev cmake ninja-build build-essential \
            libgl1-mesa-dev libxcb-icccm4-dev libxcb-image0-dev \
            libxcb-keysyms1-dev libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-shape0-dev libxcb-sync-dev libxcb-xfixes0-dev \
            libxcb-xkb-dev libxkbcommon-dev libxkbcommon-x11-dev \
            python3-pip
          pip3 install aqtinstall

      - name: Install Qt 6.5.0 (Android & Desktop Tools)
        run: |
          # Устанавливаем в отдельные подпапки внутри рабочей директории
          aqt install-qt linux android 6.5.0 android_arm64_v8a --outputdir ${{ github.workspace }}/Qt
          aqt install-qt linux desktop 6.5.0 gcc_64 --outputdir ${{ github.workspace }}/Qt
          
          # Прописываем пути в GITHUB_ENV для последующих шагов
          echo "QT_ANDROID_PATH=${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a" >> $GITHUB_ENV
          echo "QT_HOST_PATH=${{ github.workspace }}/Qt/6.5.0/gcc_64" >> $GITHUB_ENV
          echo "Qt6_DIR=${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a/lib/cmake/Qt6" >> $GITHUB_ENV

      - name: Verify & Debug Paths
        run: |
          echo "Checking Qt Android config..."
          ls -l ${{ env.QT_ANDROID_PATH }}/lib/cmake/Qt6/Qt6Config.cmake || exit 1
          echo "Checking Qt Host tools..."
          ls -l ${{ env.QT_HOST_PATH }}/bin/moc || exit 1
          echo "✅ All Qt components verified"

      - name: Setup Boost 1.83.0
        run: |
          if [ ! -d "boost_1_83_0" ]; then
            echo "📦 Downloading Boost..."
            wget -q https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.bz2
            tar -xjf boost_1_83_0.tar.bz2
          fi
          echo "BOOST_ROOT=${{ github.workspace }}/boost_1_83_0" >> $GITHUB_ENV

      - name: Setup RapidJSON
        run: |
          if [ ! -d "rapidjson" ]; then
            git clone --depth 1 https://github.com/Tencent/rapidjson.git
          fi
          echo "RAPIDJSON_ROOT=${{ github.workspace }}/rapidjson/include" >> $GITHUB_ENV

      - name: Setup libcurl for Android
        run: |
          # Копируем заголовки в плоскую структуру для CMake
          mkdir -p ${{ github.workspace }}/curl_flat
          cp -r /usr/include/curl/* ${{ github.workspace }}/curl_flat/ 2>/dev/null || true
          echo "CURL_INCLUDE_PATH=${{ github.workspace }}/curl_flat" >> $GITHUB_ENV

      - name: Build Project
        run: |
          chmod +x gradlew
          # Передаем все пути через Project Properties (-P) для Gradle
          ./gradlew :app:assembleDebug \
            -Pqt.android.path="${{ env.QT_ANDROID_PATH }}" \
            -Pqt.host.path="${{ env.QT_HOST_PATH }}" \
            -Pboost.root="${{ env.BOOST_ROOT }}" \
            -Prapidjson.root="${{ env.RAPIDJSON_ROOT }}" \
            --stacktrace 2>&1 | tee build.log
        env:
          # Пробрасываем переменные окружения в процесс Gradle
          QT_ANDROID_PATH: ${{ env.QT_ANDROID_PATH }}
          QT_HOST_PATH: ${{ env.QT_HOST_PATH }}
          BOOST_ROOT: ${{ env.BOOST_ROOT }}
          RAPIDJSON_ROOT: ${{ env.RAPIDJSON_ROOT }}

      - name: Save build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-build-logs
          path: |
            app/.cxx/**/*.log
            app/build/reports/
          retention-days: 7
          
