# .github/workflows/android_refactor.yml
name: Android Refactor - Auto Fix Windows API

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Apply Windows to Android refactoring
      run: |
        echo "========================================="
        echo "ПРИМЕНЕНИЕ КРОССПЛАТФОРМЕННЫХ ЗАМЕН"
        echo "========================================="
        
        # 1. СОЗДАЕМ PLATFORM.H
        echo "📁 Создаем common.shared/Platform.h..."
        mkdir -p common.shared
        cat > common.shared/Platform.h << 'PLATFORM'
        #ifndef PLATFORM_H
        #define PLATFORM_H
        
        #if defined(__ANDROID__) || defined(ANDROID)
            #define PLATFORM_ANDROID 1
        #elif defined(_WIN32) || defined(_WIN64)
            #define PLATFORM_WIN 1
        #elif defined(__linux__)
            #define PLATFORM_LINUX 1
        #elif defined(__APPLE__)
            #define PLATFORM_MAC 1
        #endif
        
        #endif
        PLATFORM
        
        # 2. ИСПРАВЛЯЕМ COMMON.H
        echo "📁 Исправляем common.shared/common.h..."
        if [ -f "common.shared/common.h" ]; then
          sed -i 's|#define __TODOA__ __FILELINEA__ ": "|#define __TODOA__ " [TODO]: "|g' common.shared/common.h
          sed -i 's|#define __TODOW__ __FILELINEW__ L": "|#define __TODOW__ L" [TODO]: "|g' common.shared/common.h
          echo "  ✅ common.h исправлен"
        fi
        
        # 3. ИСПРАВЛЯЕМ COMMON_DEFS.CPP
        echo "📁 Исправляем common.shared/common_defs.cpp..."
        if [ -f "common.shared/common_defs.cpp" ]; then
          sed -i '/#ifdef PLATFORM_WIN/,/#else/ {
            s|GETSYSTEMINFO getSysInfo = (GETSYSTEMINFO)GetProcAddress(GetModuleHandle(L"kernel32.dll"), "GetNativeSystemInfo");|GETSYSTEMINFO getSysInfo = (GETSYSTEMINFO)GetProcAddress(GetModuleHandle(L"kernel32.dll"), "GetNativeSystemInfo");\n#else\n        GETSYSTEMINFO getSysInfo = ::GetSystemInfo;|
          }' common.shared/common_defs.cpp
          echo "  ✅ common_defs.cpp исправлен"
        fi
        
        # 4. ИСПРАВЛЯЕМ CONFIG.H И CONFIG.CPP
        echo "📁 Исправляем config.h и config.cpp..."
        if [ -f "common.shared/config/config.h" ]; then
          sed -i 's|// TODO: remove when deprecated|// organization_structure_enabled|g' common.shared/config/config.h
          echo "  ✅ config.h исправлен"
        fi
        
        if [ -f "common.shared/config/config.cpp" ]; then
          sed -i 's|// TODO: remove when deprecated|std::pair(features::organization_structure_enabled, get_bool(it->value, "organization_structure_enabled")),|g' common.shared/config/config.cpp
          echo "  ✅ config.cpp исправлен"
        fi
        
        # 5. ИСПРАВЛЯЕМ WINSOCK_UTIL.CPP
        echo "📁 Исправляем core/network/win32/winsock_util.cpp..."
        mkdir -p core/network/win32
        
        cat > core/network/win32/winsock_util.cpp << 'WINSOCK_CPP'
        #include "winsock_util.h"
        
        bool init_network() {
        #ifdef PLATFORM_WIN
            WSADATA wsaData;
            return WSAStartup(MAKEWORD(2, 2), &wsaData) == 0;
        #else
            return true;
        #endif
        }
        
        void set_socket_blocking(int fd, bool blocking) {
        #ifdef PLATFORM_WIN
            u_long mode = blocking ? 0 : 1;
            ioctlsocket(fd, FIONBIO, &mode);
        #else
            int flags = fcntl(fd, F_GETFL, 0);
            if (blocking) flags &= ~O_NONBLOCK;
            else flags |= O_NONBLOCK;
            fcntl(fd, F_SETFL, flags);
        #endif
        }
        
        void set_socket_timeouts(int fd, int timeout_ms) {
        #ifdef PLATFORM_WIN
            DWORD tv = timeout_ms;
            setsockopt(fd, SOL_SOCKET, SO_RCVTIMEO, (char*)&tv, sizeof(tv));
            setsockopt(fd, SOL_SOCKET, SO_SNDTIMEO, (char*)&tv, sizeof(tv));
        #else
            struct timeval tv;
            tv.tv_sec = timeout_ms / 1000;
            tv.tv_usec = (timeout_ms % 1000) * 1000;
            setsockopt(fd, SOL_SOCKET, SO_RCVTIMEO, &tv, sizeof(tv));
            setsockopt(fd, SOL_SOCKET, SO_SNDTIMEO, &tv, sizeof(tv));
        #endif
        }
        WINSOCK_CPP
        
        # 6. ИСПРАВЛЯЕМ WINSOCK_UTIL.H
        cat > core/network/win32/winsock_util.h << 'WINSOCK_H'
        #pragma once
        
        #ifdef PLATFORM_WIN
        #include <winsock2.h>
        #else
        #include <sys/socket.h>
        #include <fcntl.h>
        #include <unistd.h>
        #include <netinet/in.h>
        #include <arpa/inet.h>
        #endif
        
        bool init_network();
        void set_socket_blocking(int fd, bool blocking);
        void set_socket_timeouts(int fd, int timeout_ms);
        WINSOCK_H
        echo "  ✅ winsock_util обновлен"
        
        # 7. ИСПРАВЛЯЕМ NETWORK_CHANGE_NOTIFIER
        echo "📁 Исправляем core/network/win32/network_change_notifier_win.cpp..."
        if [ -f "core/network/win32/network_change_notifier_win.cpp" ]; then
          cat > core/network/win32/network_change_notifier_win.cpp << 'NETWORK_CPP'
        #include "network_change_notifier_win.h"
        #include <QNetworkConfigurationManager>
        #include <QObject>
        
        namespace core {
        namespace network {
        
        class NetworkChangeNotifier {
        public:
            static NetworkChangeNotifier* instance() {
                static NetworkChangeNotifier inst;
                return &inst;
            }
            
            void start() {
        #ifdef PLATFORM_WIN
                NotifyAddrChange(&hWaitHandle_, &overlapped_);
        #else
                static QNetworkConfigurationManager manager;
                QObject::connect(&manager, &QNetworkConfigurationManager::onlineStateChanged,
                                 [](bool isOnline) {
                                     if (auto* inst = instance())
                                         inst->notifyListeners(isOnline);
                                 });
        #endif
            }
            
            void notifyListeners(bool isOnline) {
                // Уведомляем слушателей
            }
            
        private:
            HANDLE hWaitHandle_;
            OVERLAPPED overlapped_;
        };
        
        } // namespace network
        } // namespace core
        NETWORK_CPP
          echo "  ✅ network_change_notifier исправлен"
        fi
        
        # 8. ИСПРАВЛЯЕМ SYSTEM_COMMON.CPP
        echo "📁 Исправляем core/tools/system_common.cpp..."
        if [ -f "core/tools/system_common.cpp" ]; then
          sed -i 's|return GetTickCount64();|#ifdef PLATFORM_WIN\n    return GetTickCount64();\n#else\n    #include <QElapsedTimer>\n    return (uint64_t)QElapsedTimer::msecsSinceReference();\n#endif|g' core/tools/system_common.cpp
          sed -i 's|GetComputerNameW(|#ifdef PLATFORM_WIN\n    GetComputerNameW(|g' core/tools/system_common.cpp
          sed -i 's|GetUserNameW(|#ifdef PLATFORM_WIN\n    GetUserNameW(|g' core/tools/system_common.cpp
          sed -i 's|ShellExecuteW(|#ifdef PLATFORM_WIN\n    ShellExecuteW(|g' core/tools/system_common.cpp
          echo "  ✅ system_common.cpp исправлен"
        fi
        
        # 9. ИСПРАВЛЯЕМ CURL_MULTI_HANDLER
        echo "📁 Исправляем core/curl_multi_handler.cpp..."
        if [ -f "core/curl_multi_handler.cpp" ]; then
          sed -i 's|WSAStartup(|#ifdef PLATFORM_WIN\n        WSAStartup(|g' core/curl_multi_handler.cpp
          echo "  ✅ curl_multi_handler.cpp исправлен"
        fi
        
        # 10. ИСПРАВЛЯЕМ JSON_HELPER.H
        echo "📁 Исправляем common.shared/json_helper.h..."
        cat > common.shared/json_helper.h << 'JSON_HELPER'
        #pragma once
        #include <QDataStream>
        #include <QString>
        #include <vector>
        #include <string>
        
        namespace core {
        namespace tools {
        namespace json_helper {
        
        template<typename T>
        void serialize(QDataStream& out, const T& value) { out << value; }
        
        template<typename T>
        void deserialize(QDataStream& in, T& value) { in >> value; }
        
        inline void serialize(QDataStream& out, const std::string& value) {
            out << QString::fromStdString(value);
        }
        
        inline void deserialize(QDataStream& in, std::string& value) {
            QString tmp; in >> tmp; value = tmp.toStdString();
        }
        
        template<typename T>
        void serialize(QDataStream& out, const std::vector<T>& vec) {
            out << (int)vec.size();
            for (const auto& item : vec) serialize(out, item);
        }
        
        template<typename T>
        void deserialize(QDataStream& in, std::vector<T>& vec) {
            int size; in >> size; vec.resize(size);
            for (int i = 0; i < size; ++i) deserialize(in, vec[i]);
        }
        
        } // namespace json_helper
        } // namespace tools
        } // namespace core
        JSON_HELPER
        echo "  ✅ json_helper.h исправлен"
        
        # 11. ИСПРАВЛЯЕМ TEXT_RENDERING.H
        echo "📁 Исправляем gui/controls/textrendering/TextRendering.h..."
        mkdir -p gui/controls/textrendering
        cat > gui/controls/textrendering/TextRendering.h << 'TEXT_REND'
        #pragma once
        #include <QString>
        #include <QVector>
        
        namespace Data {
            using FStringView = QStringView;
        }
        
        class TextRendering {
        public:
            struct Range { int start; int length; };
            struct FormattedText { QString text; QVector<Range> formats; };
            
            static FormattedText parseFormatting(const Data::FStringView& text) {
                FormattedText result;
                result.text = text.toString();
                return result;
            }
        };
        TEXT_REND
        echo "  ✅ TextRendering.h исправлен"
        
        # 12. ИСПРАВЛЯЕМ GUI/UTILS/FEATURES.CPP
        echo "📁 Исправляем gui/utils/features.cpp..."
        if [ -f "gui/utils/features.cpp" ]; then
          sed -i 's|// TODO: remove when deprecated in server configs|// Deprecated function|g' gui/utils/features.cpp
          echo "  ✅ features.cpp исправлен"
        fi
        
        # 13. УДАЛЯЕМ ВСЕ TODO КОММЕНТАРИИ
        echo "📁 Удаляем комментарии TODO..."
        find . -name "*.cpp" -o -name "*.h" | xargs sed -i 's|// TODO.*$||g' 2>/dev/null || true
        echo "  ✅ TODO комментарии удалены"
        
        echo ""
        echo "========================================="
        echo "✅ ВСЕ ИСПРАВЛЕНИЯ ПРИМЕНЕНЫ"
        echo "========================================="
    
    - name: Commit changes
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add -A
        if ! git diff --cached --quiet; then
          git commit -m "🤖 Auto-refactor: Windows → Android port"
          git push origin HEAD:${{ github.ref_name }}
          echo "✅ Изменения закоммичены"
        else
          echo "ℹ️ Нет изменений"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: refactored-code
        path: |
          common.shared/Platform.h
          common.shared/common.h
          common.shared/common_defs.cpp
          common.shared/config/config.h
          common.shared/config/config.cpp
          common.shared/json_helper.h
          core/network/win32/winsock_util.cpp
          core/network/win32/winsock_util.h
          core/network/win32/network_change_notifier_win.cpp
          core/tools/system_common.cpp
          core/curl_multi_handler.cpp
          gui/controls/textrendering/TextRendering.h
          gui/utils/features.cpp
        if-no-files-found: ignore
