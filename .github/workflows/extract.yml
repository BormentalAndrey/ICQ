name: Extract OpenSSL

on: workflow_dispatch

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract
        run: |
          tar -xzf openssl-android-arm64-only.tar.gz
          ls -la
          
      - uses: actions/upload-artifact@v4
        with:
          name: openssl-files
          path: ssl_3/
