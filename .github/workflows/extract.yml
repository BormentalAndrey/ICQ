name: Build ICQ Mobile

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'

      - name: Fix Environment and Case Sensitivity
        run: |
          # Создаем симлинки для Linux (Case Sensitivity)
          # Это решает ошибку fatal error: 'voip/voip3.h'
          mkdir -p core/voip
          if [ -d "core/Voip" ]; then
            ln -sf ../Voip/VoipManager.h core/voip/voip3.h
            # Если в Voip есть реальный voip3.h, линкуем его:
            [ -f "core/Voip/voip3.h" ] && ln -sf ../Voip/voip3.h core/voip/voip3.h
            ln -sf Voip core/voip_dir 
          fi
          
          # Заглушки для конфигурации
          mkdir -p common.shared/config
          touch common.shared/config/config_data.h

      - name: Cache Boost
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost_1_83_0
          key: ${{ runner.os }}-boost-1.83.0

      - name: Download Boost 1.83.0
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          # Используем 1.83.0, так как в 1.85 удален wpath
          wget -q https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.bz2
          tar -xjf boost_1_83_0.tar.bz2

      - name: Download RapidJSON
        run: |
          git clone --depth 1 https://github.com/Tencent/rapidjson.git ${{ github.workspace }}/rapidjson

      - name: Build ICQ Mobile
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
        env:
          BOOST_ROOT: ${{ github.workspace }}/boost_1_83_0
          RAPIDJSON_ROOT: ${{ github.workspace }}/rapidjson/include

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk
          
