name: Build ICQ Mobile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Важно для ICQ core
          fetch-depth: 1
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "CMAKE_PATH=$ANDROID_HOME/cmake/3.22.1/bin" >> $GITHUB_ENV
      
      - name: Setup Gradle wrapper
        run: |
          chmod +x gradlew
          # Проверяем, что wrapper работает
          ./gradlew --version
      
      - name: Build native core
        run: |
          # Создаем toolchain file для CMake
          cat > android.toolchain.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Android)
          set(CMAKE_SYSTEM_VERSION 24)
          set(CMAKE_ANDROID_ARCH_ABI arm64-v8a)
          set(CMAKE_ANDROID_NDK $ENV{ANDROID_NDK})
          set(CMAKE_ANDROID_STL_TYPE c++_shared)
          EOF
          
          # Собираем core с помощью CMake из корня
          mkdir -p build-native
          cd build-native
          
          # Указываем пути к Android NDK toolchain
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release
          
          make -j$(nproc)
          cd ..
      
      - name: Build Android APK
        run: |
          # Собираем Android модуль
          ./gradlew :app:assembleRelease --stacktrace
        env:
          ORG_GRADLE_PROJECT_ANDROID_ABI: arm64-v8a
      
      - name: Run tests
        run: |
          # Запускаем unit тесты
          ./gradlew testReleaseUnitTest
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/*.txt
          if-no-files-found: error
      
      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: |
            build-native/**/*.so
            **/build/intermediates/merged_native_libs/release/**/*.so
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/
