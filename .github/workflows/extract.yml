# .github/workflows/build.yml
name: Build ICQ Mobile

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Ручной запуск

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Если есть сабмодули (ядро ICQ)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build CMake dependencies (Core)
        run: |
          # Если ядро ICQ требует предварительной сборки
          cd src/main/cpp
          mkdir -p build
          cd build
          cmake ..
          make -j4

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Run tests
        run: ./gradlew testReleaseUnitTest

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload mapping files (для крашлетики)
        uses: actions/upload-artifact@v4
        with:
          name: mapping
          path: app/build/outputs/mapping/release/

  # Опционально: сборка для разных архитектур отдельно
  build-matrix:
    name: Build for ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Build for ${{ matrix.abi }}
        run: |
          echo "android.defaultConfig.ndk.abiFilters='${{ matrix.abi }}'" >> gradle.properties
          ./gradlew assembleRelease
          
      - name: Upload ${{ matrix.abi }} APK
        uses: actions/upload-artifact@v4
        with:
          name: icq-${{ matrix.abi }}
          path: app/build/outputs/apk/release/app-release.apk
