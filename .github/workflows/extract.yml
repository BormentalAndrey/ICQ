name: Build ICQ Mobile with Qt

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          # ИСПРАВЛЕНО: пакеты разделены пробелами/переносами строк
          packages: |
            ndk;26.1.10909125
            cmake;3.22.1
            platform-tools
            platforms;android-33
          cmdline-tools-version: 'latest'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            cmake \
            ninja-build \
            build-essential \
            libgl1-mesa-dev \
            libxcb-xinerama0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xkb1-dev \
            libxkbcommon-x11-dev \
            libxkbcommon-dev \
            python3-pip \
            zstd

      - name: Install aqtinstall
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install aqtinstall==3.3.*

      - name: Install Qt 6.5.0
        run: |
          # Устанавливаем в чистую папку Qt_Root без лишней вложенности
          python3 -m aqt install-qt linux android 6.5.0 android_arm64_v8a \
            --autodesktop \
            --outputdir ${{ github.workspace }}/Qt_Root

      - name: Set Environment Variables
        run: |
          QT_VERSION="6.5.0"
          BASE_PATH="${{ github.workspace }}/Qt_Root/$QT_VERSION"
          
          ANDROID_PATH="$BASE_PATH/android_arm64_v8a"
          HOST_PATH="$BASE_PATH/gcc_64"
          
          echo "QT_ANDROID_PATH=$ANDROID_PATH" >> $GITHUB_ENV
          echo "QT_HOST_PATH=$HOST_PATH" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          # Путь к конкретной версии NDK, установленной выше
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          
          # Настройка префиксов для CMake
          echo "CMAKE_PREFIX_PATH=$ANDROID_PATH/lib/cmake:$HOST_PATH/lib/cmake" >> $GITHUB_ENV
          
          # Добавляем бинарники Qt в PATH
          echo "$HOST_PATH/bin" >> $GITHUB_PATH

      - name: Verify Installation
        run: |
          echo "=== Android SDK: $ANDROID_HOME"
          echo "=== Android NDK: $ANDROID_NDK_ROOT"
          echo "=== Qt Android: $QT_ANDROID_PATH"
          
          if [ ! -d "$QT_ANDROID_PATH" ]; then
            echo "❌ Qt Android не найден!"
            exit 1
          fi
          
          if [ ! -d "$ANDROID_NDK_ROOT" ]; then
            echo "❌ NDK не найден по пути $ANDROID_NDK_ROOT"
            ls -d $ANDROID_HOME/ndk/* || true
            exit 1
          fi

      - name: Download External Dependencies
        run: |
          wget https://boostorg.jfrog.io/artifactory/main/release/1.83.0/source/boost_1_83_0.tar.gz -O boost.tar.gz
          tar -xzf boost.tar.gz
          git clone --depth 1 https://github.com/Tencent/rapidjson.git

      - name: Fix permissions and Build APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee build.log
        env:
          BOOST_ROOT: ${{ github.workspace }}/boost_1_83_0
          RAPIDJSON_ROOT: ${{ github.workspace }}/rapidjson
          QT_PATH: ${{ env.QT_ANDROID_PATH }}
          QT_HOST_PATH: ${{ env.QT_HOST_PATH }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Save build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Debug Data on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-context
          path: |
            app/build/reports/
            app/.cxx/
            build.log
          retention-days: 7
          
