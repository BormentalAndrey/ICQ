name: Build ICQ Mobile

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'
          cmdline-tools-version: 'latest'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            cmake \
            ninja-build \
            build-essential \
            libgl1-mesa-dev \
            python3-pip

      - name: Install Qt
        run: |
          pip install aqtinstall
          aqt install-qt linux desktop 6.5.0 gcc_64 --outputdir ${{ github.workspace }}/Qt
          aqt install-qt linux android 6.5.0 android_arm64_v8a --outputdir ${{ github.workspace }}/Qt

      - name: Setup Boost
        run: |
          wget -q https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.bz2
          tar -xjf boost_1_83_0.tar.bz2
          echo "BOOST_ROOT=${{ github.workspace }}/boost_1_83_0" >> $GITHUB_ENV

      - name: Setup RapidJSON
        run: |
          git clone --depth 1 https://github.com/Tencent/rapidjson.git
          echo "RAPIDJSON_ROOT=${{ github.workspace }}/rapidjson/include" >> $GITHUB_ENV

      - name: Setup environment
        run: |
          echo "Qt6_DIR=${{ github.workspace }}/Qt/6.5.0/gcc_64" >> $GITHUB_ENV
          echo "Qt6_ANDROID_DIR=${{ github.workspace }}/Qt/6.5.0/android_arm64_v8a" >> $GITHUB_ENV
          chmod +x gradlew

      - name: Build
        run: |
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
