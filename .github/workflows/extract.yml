name: Build ICQ Mobile

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'

      - name: Fix Case Sensitivity and Missing Headers
        run: |
          # Исправление регистра для папки Voip (Linux sensitive)
          if [ -d "core/Voip" ]; then
            ln -sf Voip core/voip
            echo "Symlink for core/voip created."
          fi
          
          # Исправление регистра для common.shared
          if [ -d "common.shared" ]; then
            ln -sf common.shared common_shared
            echo "Symlink for common_shared created."
          fi

          # Создание базового конфига, если он отсутствует (предотвращение fatal error 'config_data.h')
          mkdir -p common.shared/config
          if [ ! -f "common.shared/config/config_data.h" ]; then
            echo "#pragma once" > common.shared/config/config_data.h
            echo "// Auto-generated stub for build" >> common.shared/config/config_data.h
            echo "Created stub for config_data.h"
          fi

      - name: Cache Boost
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost_1_85_0
          key: ${{ runner.os }}-boost-1.85.0

      - name: Download Boost
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          wget -q https://archives.boost.io/release/1.85.0/source/boost_1_85_0.tar.bz2
          tar -xjf boost_1_85_0.tar.bz2

      - name: Download RapidJSON
        run: |
          git clone --depth 1 https://github.com/Tencent/rapidjson.git ${{ github.workspace }}/rapidjson

      - name: Build ICQ Mobile
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
        env:
          BOOST_ROOT: ${{ github.workspace }}/boost_1_85_0
          RAPIDJSON_ROOT: ${{ github.workspace }}/rapidjson/include

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk
