# .github/workflows/build.yml
name: Build ICQ Mobile

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"
      
      - name: Create Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          
          # gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Download wrapper jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar
          
          chmod +x gradlew
      
      - name: Create settings.gradle.kts
        run: |
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://jitpack.io") }
              }
          }
          rootProject.name = "ICQ"
          include(":app")
          include(":core")
          include(":corelib")
          include(":gui")
          include(":gui.shared")
          include(":common.shared")
          include(":libomicron")
          EOF
      
      - name: Create root build.gradle.kts
        run: |
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.6.0" apply false
              id("com.android.library") version "8.6.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.23" apply false
              id("com.google.gms.google-services") version "4.4.2" apply false
              id("com.google.devtools.ksp") version "1.9.23-1.0.20" apply false
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://jitpack.io") }
              }
          }
          
          tasks.register("cleanAll") {
              delete(rootProject.buildDir)
          }
          EOF
      
      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m
          org.gradle.parallel=true
          org.gradle.caching=true
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          EOF
      
      - name: Create products/project_settings.cmake
        run: |
          mkdir -p products
          cat > products/project_settings.cmake << 'EOF'
          set(PROJECT_NAME "ICQ")
          set(PROJECT_VERSION "10.0.0")
          
          if(NOT CMAKE_BUILD_TYPE)
              set(CMAKE_BUILD_TYPE "Release" CACHE STRING "Build type" FORCE)
          endif()
          
          option(BUILD_SHARED_LIBS "Build shared libraries" ON)
          option(ENABLE_TESTS "Enable tests" OFF)
          
          if(ANDROID)
              set(PLATFORM_ANDROID TRUE)
              add_definitions(-DANDROID)
          endif()
          
          set(CMAKE_CXX_STANDARD 17)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          EOF
      
      - name: Build debug APK
        run: |
          ./gradlew :app:assembleDebug --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
