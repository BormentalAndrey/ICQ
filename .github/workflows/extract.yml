# .github/workflows/build.yml
name: Build ICQ Mobile

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"
      
      - name: Install Boost
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev
      
      - name: Find Boost path
        run: |
          BOOST_PATH=$(dpkg -L libboost-all-dev | grep -m1 "boost/stacktrace.hpp" | xargs dirname | xargs dirname)
          echo "BOOST_PATH=$BOOST_PATH" >> $GITHUB_ENV
          echo "Boost found at: $BOOST_PATH"
      
      - name: Fix permissions
        run: chmod +x gradlew
      
      - name: Build with Boost path
        run: |
          ./gradlew :app:assembleDebug -PboostPath=${{ env.BOOST_PATH }}
