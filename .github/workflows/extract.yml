name: Android CI Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Создание директории для логов
        run: |
          mkdir -p logs
          mkdir -p build/reports

      - name: Установка Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Установка Android SDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: "26.1.10909125"
          packages: |
            platform-tools
            platforms;android-33
            platforms;android-34
            build-tools;34.0.0
            ndk;26.1.10909125

      - name: Кэширование Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/.cxx
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Проверка зависимостей Qt
        run: |
          echo "=== Проверка Qt зависимостей ===" | tee -a logs/deps_check.log
          if [ -d "Qt/android_arm64_v8a" ]; then
            echo "✅ Qt найден" | tee -a logs/deps_check.log
            ls -la Qt/android_arm64_v8a >> logs/deps_check.log 2>&1
          else
            echo "⚠️ Qt не найден" | tee -a logs/deps_check.log
          fi
          
      - name: Проверка зависимостей OpenSSL
        run: |
          echo "=== Проверка OpenSSL зависимостей ===" | tee -a logs/deps_check.log
          if [ -d "Openssl-android-arm64/arm64-v8a" ]; then
            echo "✅ OpenSSL найден" | tee -a logs/deps_check.log
            ls -la Openssl-android-arm64/arm64-v8a >> logs/deps_check.log 2>&1
          else
            echo "⚠️ OpenSSL не найден" | tee -a logs/deps_check.log
          fi

      - name: Разрешение на выполнение gradlew
        run: chmod +x gradlew

      - name: Проверка Gradle Wrapper
        run: |
          echo "=== Проверка Gradle Wrapper ===" | tee -a logs/gradle_check.log
          ./gradlew --version >> logs/gradle_check.log 2>&1

      - name: Очистка предыдущих сборок
        run: |
          echo "=== Очистка ===" | tee -a logs/clean.log
          ./gradlew clean --stacktrace >> logs/clean.log 2>&1 || true

      - name: Сборка проекта
        id: build
        run: |
          echo "=== Сборка $(date) ===" | tee -a logs/build.log
          ./gradlew assembleRelease --stacktrace --info >> logs/build.log 2>&1
          BUILD_EXIT_CODE=$?
          
          echo "Код завершения: $BUILD_EXIT_CODE" >> logs/build.log
          echo "BUILD_EXIT_CODE=$BUILD_EXIT_CODE" >> $GITHUB_ENV
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ Ошибка сборки!" | tee -a logs/build.log
            echo "Последние 50 строк:" | tee -a logs/build.log
            tail -50 logs/build.log | tee -a logs/build.log
            exit $BUILD_EXIT_CODE
          fi
        continue-on-error: true

      - name: Запуск тестов
        if: always()
        run: |
          echo "=== Тесты ===" | tee -a logs/tests.log
          # Убеждаемся, что gradlew имеет права на выполнение
          chmod +x gradlew
          ./gradlew test --stacktrace >> logs/tests.log 2>&1 || echo "⚠️ Тесты не найдены или не выполнены" | tee -a logs/tests.log

      - name: Сохранение логов и отчетов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            logs/
            **/build/reports/
            **/build/test-results/
            **/.cxx/**/*.log
          retention-days: 7

      - name: Сохранение APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

      - name: Сохранение отладочных артефактов
        if: steps.build.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts-${{ github.run_number }}
          path: |
            app/build/outputs/apk/debug/
            app/build/intermediates/
          retention-days: 3

      - name: Отчет об ошибке
        if: failure()
        run: |
          echo "# Отчет об ошибке" > error_report.md
          echo "Дата: $(date)" >> error_report.md
          echo "Код ошибки: $BUILD_EXIT_CODE" >> error_report.md
          echo "" >> error_report.md
          echo "## Последние строки лога:" >> error_report.md
          echo '```' >> error_report.md
          tail -50 logs/build.log >> error_report.md 2>/dev/null
          echo '```' >> error_report.md
          
      - name: Сохранение отчета
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-report
          path: error_report.md
          retention-days: 30
