# .github/workflows/ci.yml

name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Create logs directory
      run: mkdir -p logs
    
    - name: Build project
      run: |
        echo "Starting build..." | tee logs/build.log
        your-build-command 2>&1 | tee -a logs/build.log
      continue-on-error: true
    
    - name: Upload build logs
      if: always()  # Всегда загружать логи, даже при ошибке
      uses: actions/upload-artifact@v3
      with:
        name: build-logs
        path: logs/
        retention-days: 7

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Create logs directory
      run: mkdir -p logs
    
    - name: Run tests
      run: |
        echo "Running tests..." | tee logs/test.log
        your-test-command 2>&1 | tee -a logs/test.log
      continue-on-error: true
    
    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-logs
        path: logs/
        retention-days: 7
