# .github/workflows/android-build.yml
name: Android Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'
          cmdline-tools-version: 'latest'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            cmake \
            ninja-build \
            build-essential \
            libgl1-mesa-dev

      - name: Set Qt5 environment
        run: |
          QT_DIR="${{ github.workspace }}/qt5-bundle"
          echo "Qt5_DIR=${QT_DIR}/cmake/Qt5" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=${QT_DIR}/cmake" >> $GITHUB_ENV
          echo "PATH=${QT_DIR}/bin:$PATH" >> $GITHUB_ENV

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee build.log
        env:
          Qt5_DIR: ${{ github.workspace }}/qt5-bundle/cmake/Qt5
          BOOST_ROOT: ${{ github.workspace }}/boost_1_83_0
          RAPIDJSON_ROOT: ${{ github.workspace }}/rapidjson/include

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: icq-mobile-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
