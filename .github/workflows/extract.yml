# .github/workflows/assemble-dependencies.yml
name: Assemble ICQ Dependencies

on:
  push:
    branches: [ main, master ]
    paths:
      - 'icq-dependencies.part.*'
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble from parts
        run: |
          echo "Сборка архива из частей..."
          cat icq-dependencies.part.* > icq-dependencies.zip
          ls -lh icq-dependencies.zip

      - name: Remove parts
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git rm icq-dependencies.part.*
          git commit -m "Remove parts after assembly" || echo "No changes"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: icq-deps-v1.0
          name: ICQ Dependencies v1.0
          files: icq-dependencies.zip
          body: |
            ## ICQ Dependencies Bundle
            
            Полный архив зависимостей ICQ (525 MB)
            
            ### Содержимое:
            - Qt5 libraries
            - Boost
            - RapidJSON
            - curl
            - Другие зависимости
            
            ### Использование:
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/icq-deps-v1.0/icq-dependencies.zip
            unzip icq-dependencies.zip -d icq-dependencies/
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
