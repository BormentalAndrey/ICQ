name: Auto-fix Compilation Errors

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch for PR'
        required: false
        default: 'main'
        type: string

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Git config
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
      - name: Setup Clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14
          sudo ln -sf /usr/bin/clang-format-14 /usr/bin/clang-format
          
      - name: Create fix branch
        run: |
          BRANCH_NAME="fix/config-excess-elements"
          git checkout -b $BRANCH_NAME || git checkout $BRANCH_NAME
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          
      - name: Fix config.cpp - excess elements in struct initializer
        run: |
          FILE="common.shared/config/config.cpp"
          if [ -f "$FILE" ]; then
            # Заменяем std::pair на инициализацию фигурными скобками
            sed -i '247s/std::pair(\([^,]*\), \([^)]*\))/{ \1, \2 }/' "$FILE"
            echo "✓ Fixed config.cpp line 247"
          fi
          
      - name: Fix antivirus_types.cpp - namespace issues
        run: |
          FILE="common.shared/antivirus/antivirus_types.cpp"
          if [ -f "$FILE" ]; then
            # Заменяем tools::make_string_ref на common::json::make_string_ref
            sed -i 's/tools::make_string_ref/common::json::make_string_ref/g' "$FILE"
            # Заменяем tools::unserialize_value на common::json::unserialize_value
            sed -i 's/tools::unserialize_value/common::json::unserialize_value/g' "$FILE"
            echo "✓ Fixed antivirus_types.cpp namespace issues"
          fi
          
      - name: Fix MemoryStats macros
        run: |
          # Проверяем наличие определений макросов
          for file in gui/memory_stats/*.h; do
            if [ -f "$file" ]; then
              # Добавляем определения макросов, если их нет
              if ! grep -q "#define MEMSTATS_NS_BEGIN" "$file"; then
                # Добавляем в начало файла
                sed -i '1i#ifndef MEMSTATS_NS_BEGIN\n#define MEMSTATS_NS_BEGIN namespace memory_stats {\n#define MEMSTATS_NS_END }\n#endif\n' "$file"
                echo "✓ Added macros to $file"
              fi
            fi
          done
          
          # Альтернатива: создать общий заголовок
          cat > gui/memory_stats/memory_stats_macros.h << 'EOF'
#ifndef MEMORY_STATS_MACROS_H
#define MEMORY_STATS_MACROS_H

#define MEMSTATS_NS_BEGIN namespace memory_stats {
#define MEMSTATS_NS_END }

#endif // MEMORY_STATS_MACROS_H
EOF
          echo "✓ Created memory_stats_macros.h"
          
      - name: Fix curl.h include
        run: |
          FILE="core/curl_handler.h"
          if [ -f "$FILE" ]; then
            # Заменяем <curl.h> на <curl/curl.h> или добавляем проверку
            sed -i 's/#include <curl.h>/#ifdef __ANDROID__\n#include <curl\/curl.h>\n#else\n#include <curl.h>\n#endif/' "$FILE"
            echo "✓ Fixed curl.h include path"
          fi
          
      - name: Fix Qt6 includes for QRect and QStringRef
        run: |
          # Добавляем недостающие include в message.h
          FILE="gui/types/message.h"
          if [ -f "$FILE" ]; then
            if ! grep -q "#include <QRect>" "$FILE"; then
              sed -i '/#include <QString>/a #include <QRect>' "$FILE"
              echo "✓ Added QRect include to message.h"
            fi
          fi
          
          # Добавляем include для QStringRef в StringComparator.h
          FILE="gui/utils/StringComparator.h"
          if [ -f "$FILE" ]; then
            if ! grep -q "#include <QStringRef>" "$FILE"; then
              sed -i '1i#include <QStringRef>\n#include <QLatin1String>' "$FILE"
              echo "✓ Added QStringRef include to StringComparator.h"
            fi
          fi
          
          # Исправляем ql1s на QLatin1String
          if [ -f "$FILE" ]; then
            sed -i 's/ql1s/QLatin1String/g' "$FILE"
            echo "✓ Fixed ql1s to QLatin1String"
          fi
          
      - name: Fix iarray interface issues
        run: |
          FILE="gui/utils/gui_coll_helper.h"
          if [ -f "$FILE" ]; then
            # Добавляем проверки на наличие методов
            cat >> "$FILE" << 'EOF'

// Helper functions for iarray compatibility
namespace core {
    template<typename T>
    inline size_t array_size(iarray* arr) {
        return arr ? arr->size() : 0;
    }
    
    template<typename T>
    inline void array_reserve(iarray* arr, size_t size) {
        if (arr) arr->reserve(size);
    }
    
    template<typename T>
    inline void array_push_back(iarray* arr, T* value) {
        if (arr) arr->push_back(value);
    }
}
EOF
            echo "✓ Added iarray compatibility helpers"
          fi
          
      - name: Fix patch_version.h namespace
        run: |
          FILE="common.shared/patch_version.h"
          if [ -f "$FILE" ]; then
            # Проверяем, нет ли лишних скобок
            sed -i 's/^namespace common$/namespace common {/' "$FILE"
            if ! grep -q "} // namespace common" "$FILE"; then
              echo "} // namespace common" >> "$FILE"
            fi
            echo "✓ Fixed patch_version.h namespace"
          fi
          
      - name: Fix sign-compare warnings in common.h
        run: |
          FILE="common.shared/common.h"
          if [ -f "$FILE" ]; then
            # Добавляем явное приведение типов
            sed -i 's/if (_bytes > \([0-9]\+\)LL \* MEGABYTE)/if (static_cast<unsigned long long>(_bytes) > \1LL * MEGABYTE)/g' "$FILE"
            sed -i 's/if (_bytes < \([0-9]\+\)LL \* MEGABYTE)/if (static_cast<unsigned long long>(_bytes) < \1LL * MEGABYTE)/g' "$FILE"
            echo "✓ Fixed sign-compare warnings in common.h"
          fi
          
      - name: Fix sign-compare warnings in binary_stream.h
        run: |
          FILE="core/tools/binary_stream.h"
          if [ -f "$FILE" ]; then
            # Добавляем static_cast для безопасного сравнения
            sed -i '159s/if (buffer_.size() < _size)/if (buffer_.size() < static_cast<size_t>(_size))/' "$FILE"
            sed -i '187s/if (size_need > buffer_.size())/if (static_cast<size_t>(size_need) > buffer_.size())/' "$FILE"
            sed -i '219s/if (size_need > buffer_.size())/if (static_cast<size_t>(size_need) > buffer_.size())/' "$FILE"
            echo "✓ Fixed sign-compare warnings in binary_stream.h"
          fi
          
      - name: Apply clang-format to all modified files
        run: |
          MODIFIED_FILES=$(git diff --name-only)
          if [ -n "$MODIFIED_FILES" ]; then
            for file in $MODIFIED_FILES; do
              if [[ \( file =\~ \.(cpp|h|hpp) \) ]] && [ -f "$file" ]; then
                clang-format -i "$file"
                echo "✓ Formatted: $file"
              fi
            done
          fi
          
      - name: Verify syntax
        run: |
          echo "Checking for potential syntax issues..."
          
          # Проверяем баланс фигурных скобок
          for file in \( (git diff --name-only | grep -E '\.(cpp|h|hpp) \)'); do
            if [ -f "$file" ]; then
              opens=$(grep -o '{' "$file" | wc -l)
              closes=$(grep -o '}' "$file" | wc -l)
              if [ "$opens" != "$closes" ]; then
                echo "⚠ Warning: Unbalanced braces in $file: opens=$opens, closes=$closes"
              fi
            fi
          done
          
          echo "✓ Syntax verification completed"
          
      - name: Commit changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "NO_CHANGES=true" >> $GITHUB_ENV
          else
            git commit -m "build: fix compilation errors and warnings

- Fixed excess elements in struct initializer in config.cpp (line 247)
- Fixed namespace issues in antivirus_types.cpp (tools:: → common::json::)
- Added missing MEMSTATS_NS_BEGIN/END macros
- Fixed curl.h include path for Android
- Added missing Qt6 includes (QRect, QStringRef)
- Fixed ql1s to QLatin1String
- Added iarray compatibility helpers
- Fixed patch_version.h namespace
- Fixed sign-compare warnings in common.h and binary_stream.h
- Applied clang-format formatting

This is an automated fix from GitHub Actions."
            git push origin ${{ env.BRANCH_NAME }}
            echo "NO_CHANGES=false" >> $GITHUB_ENV
          fi
          
      - name: Create Pull Request
        if: env.NO_CHANGES == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `\( {context.repo.owner}: \){{ env.BRANCH_NAME }}`,
              base: '${{ github.event.inputs.target_branch || 'main' }}',
              state: 'open'
            });
            
            if (pulls.length === 0) {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Auto-fix: Compilation errors and warnings (C++/Qt6/Android)',
                body: `## 🛠️ Автоматическое исправление ошибок сборки

### Исправленные проблемы:

#### ✅ Критические ошибки компиляции:
1. **excess elements in struct initializer** в \`config.cpp:247\`
   - Заменён \`std::pair(...)\` на инициализацию \`{ ... }\`

2. **namespace issues** в \`antivirus_types.cpp\`
   - \`tools::make_string_ref\` → \`common::json::make_string_ref\`
   - \`tools::unserialize_value\` → \`common::json::unserialize_value\`

3. **Неопределённые макросы** в \`memory_stats/*.h\`
   - Добавлены \`MEMSTATS_NS_BEGIN\` и \`MEMSTATS_NS_END\`

4. **Отсутствующий заголовок** \`curl.h\`
   - Исправлен путь включения для Android

5. **Qt6 неполные include**
   - Добавлен \`#include <QRect>\` в \`message.h\`
   - Добавлен \`#include <QStringRef>\` в \`StringComparator.h\`
   - \`ql1s\` → \`QLatin1String\`

6. **Отсутствующие методы iarray**
   - Добавлены хелперы для \`size()\`, \`reserve()\`, \`push_back()\`

7. **Проблемы с namespace** в \`patch_version.h\`
   - Исправлена структура namespace

#### ⚠️ Предупреждения компилятора:
- **Sign-compare warnings** в \`common.h\` и \`binary_stream.h\`
  - Добавлены \`static_cast<size_t>\` и \`static_cast<unsigned long long>\`

### 📋 Проверка:
- ✅ Применён \`clang-format\` ко всем изменённым файлам
- ✅ Проверен баланс фигурных скобок
- ✅ Создан PR для ревью

### 🔧 Требуется дополнительное внимание:
1. **libcurl**: Убедитесь, что в \`CMakeLists.txt\` правильно подключена библиотека curl
2. **Qt6**: Проверьте, что все необходимые модули Qt6 подключены в CMake
3. **NDK**: Убедитесь, что используется совместимая версия NDK (рекомендуется r23c или r25c)

---
*Автоматический фикс от GitHub Actions*`,
                head: '${{ env.BRANCH_NAME }}',
                base: '${{ github.event.inputs.target_branch || 'main' }}'
              });
              console.log(`✅ Created PR #${pr.number}`);
            } else {
              console.log(`ℹ️ PR already exists: #${pulls[0].number}`);
            }
          }
          
      - name: Upload fix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fix-report
          path: |
            *.patch
            fix-*.log
          if-no-files-found: ignore
