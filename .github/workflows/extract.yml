Name: Build ICQ Mobile Production

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          # NDK 26.1.10909125 — проверенная версия для Qt 6.5.0
          packages: 'ndk;26.1.10909125 cmake;3.22.1'

      - name: Install Qt (aqt)
        run: |
          pip3 install aqtinstall
          # Устанавливаем Desktop Qt (нужен для инструментов сборки)
          aqt install-qt linux desktop 6.5.0 gcc_64 -O /home/runner/work/Qt
          # Устанавливаем Android Qt (сами бинарники для приложения)
          aqt install-qt linux android 6.5.0 android_arm64_v8a -O /home/runner/work/Qt

      - name: Download Dependencies (Boost & RapidJSON)
        run: |
          # Boost (header-only использование)
          curl -L https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.bz2 -o boost.tar.bz2
          tar -xjf boost.tar.bz2
          
          # RapidJSON
          git clone --depth 1 https://github.com/Tencent/rapidjson.git
          
          echo "BOOST_ROOT=${{ github.workspace }}/boost_1_83_0" >> $GITHUB_ENV
          echo "RAPIDJSON_ROOT=${{ github.workspace }}/rapidjson/include" >> $GITHUB_ENV

      - name: Fix Case Sensitivity (Linux Fix)
        run: |
          # Исправляем регистр заголовочных файлов для Linux
          find . -type f \( -name "*.cpp" -o -name "*.h" \) -exec sed -i 's/#include "StdAfx.h"/#include "stdafx.h"/g' {} +
          # Создаем пустой stdafx.h если его нет в core, чтобы сборка не падала
          mkdir -p core
          touch core/stdafx.h

      - name: Build APK
        run: |
          chmod +x gradlew
          # Пробрасываем пути к Qt и NDK напрямую в Gradle
          ./gradlew :app:assembleDebug \
            -Pqt.android.path=/home/runner/work/Qt/6.5.0/android_arm64_v8a \
            -Pqt.host.path=/home/runner/work/Qt/6.5.0/gcc_64 \
            -Pandroid.ndkpath=$ANDROID_HOME/ndk/26.1.10909125 \
            --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ICQ-Mobile-Debug
          path: app/build/outputs/apk/debug/*.apk
