# .github/workflows/cleanup-old-parts.yml
name: Cleanup Old Parts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Раз в неделю

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove old parts
        run: |
          echo "========================================="
          echo "УДАЛЕНИЕ СТАРЫХ ЧАСТЕЙ АРХИВА"
          echo "========================================="
          
          # Удаляем старые части (aa, ab, ac и т.д.)
          git rm icq-dependencies.part.* 2>/dev/null || echo "Нет старых частей"
          
          # Удаляем большие файлы если есть
          git rm --cached icq-dependencies.zip 2>/dev/null || true
          
          # Проверяем, есть ли новые архивы
          if ls qt5-*.zip 1>/dev/null 2>&1; then
            echo "Новые архивы уже есть, старые удалены"
          fi
          
          git commit -m "Clean up old parts" || echo "Нет изменений"
          git push
